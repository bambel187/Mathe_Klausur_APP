  { q:"Zylinder: Radius 4cm, Höhe 10cm (π≈3,14)\na) Volumen?\nb) Mantelfläche?\nc) Gesamtoberfläche?", h:"V=π·r²·h, Mantel=2π·r·h, Gesamt=Mantel+2Grundflächen", s:"a) 3,14·16·10=**502,4 cm³** ✓\nb) 2·3,14·4·10=**251,2 cm²** ✓\nc) 251,2+2·3,14·16=251,2+100,48=**351,68 cm²** ✓" },
  { q:"Malerarbeiten in einem Raum:\n6m × 5m × 2,8m hoch\n2 Türen: je 2m × 1m\n3 Fenster: je 1,5m × 1,2m\n1L Farbe = 12m²\n\na) Zu streichende Fläche?\nb) Benötigte Liter Farbe?", h:"Alle 4 Wände, dann Abzüge.", s:"Wände: 2·(6+5)·2,8=61,6m²\nAbzüge: 2·2+3·1,8=4+5,4=9,4m²\na) 61,6-9,4=**52,2 m²** ✓\nb) 52,2/12=**4,35 → 5 Liter** ✓" },
  { q:"Ein kreisförmiger Teich (r=5m) ist von einem 2m breiten Weg umgeben. (π≈3,14)\na) Fläche des Teichs?\nb) Fläche des Weges?\nc) Kosten des Pflasters: 40€/m²?", h:"Weg = Außenkreis(r=7) - Innenkreis(r=5)", s:"a) 3,14·25=**78,5 m²** ✓\nb) 3,14·49-78,5=153,86-78,5=**75,36 m²** ✓\nc) 75,36·40=**3.014,40 €** ✓" },
  { q:"Prisma mit dreieckiger Grundfläche:\nDreieck: g=8cm, h=6cm\nPrisma-Höhe: 10cm\n\na) Grundfläche?\nb) Volumen?\nc) Mantelfläche (3 Rechtecke, alle Seiten 8cm,6cm,10cm lang)?", h:"V=Grundfläche·Höhe", s:"a) 8·6/2=**24 cm²** ✓\nb) 24·10=**240 cm³** ✓\nc) (8+6+10)·10=**240 cm²** ✓" },
  { q:"Ein rechteckiges Zimmer: 4m × 3,5m\nBodenfliesen: 40cm × 40cm, 3,50€ pro Fliese\n\na) Anzahl Fliesen?\nb) Kosten?", h:"Fläche Fliese = 0,4m × 0,4m = 0,16m²", s:"a) 4·3,5=14m²; 14/0,16=87,5 → **88 Fliesen** ✓\nb) 88·3,50=**308 €** ✓" },
  { q:"Zwei Dreiecke haben dieselbe Fläche (36cm²).\nDreieck A: Grundlinie 12cm. Wie lang ist seine Höhe?\nDreieck B: Höhe 9cm. Wie lang ist seine Grundlinie?", h:"A=g·h/2 → h=2A/g und g=2A/h", s:"A: h=2·36/12=**6 cm** ✓\nB: g=2·36/9=**8 cm** ✓" },

  { q:"Haus mit Satteldach:\nGrundfläche 12m×10m, Wände 3m hoch\nDachseiten: je 6,5m breit, 12m lang\nFenster+Türen: 18m²\n1L Farbe=8m²\n\na) Zu streichende Außenfläche (Wände+Dach)?\nb) Liter Farbe?", h:"Wände + Dachfläche - Fenster/Türen", s:"Wände: 2·(12+10)·3=132m²\nDach: 2·12·6,5=156m²\na) 132+156-18=**270 m²** ✓\nb) 270/8=33,75 → **34 Liter** ✓" },

  { q:"Ein Tunnel hat halbkreisförmigen Querschnitt (r=4m), Länge 200m.\na) Querschnittsfläche?\nb) Volumen des Tunnels?\nc) Betonwände 0,3m dick: Wie viel m³ Beton? (π≈3,14)", h:"Innere und äußere Halbkreise vergleichen.", s:"a) 3,14·16/2=**25,12 m²** ✓\nb) 25,12·200=**5.024 m³** ✓\nc) Außenr=4,3m: 3,14·18,49/2=29,03m²\n(29,03-25,12)·200=**782 m³** Beton ✓" },

  { q:"Schräger Schnitt durch einen Quader (6cm×4cm×8cm):\nDer Schnitt geht durch 2 gegenüberliegende Kanten.\nEs entsteht ein Dreiecksprisma.\na) Volumen des Dreiecksprismas?\nb) Oberfläche?", h:"Dreieck: Grundlinie 6cm, Höhe 8cm. Länge 4cm.", s:"a) Grundfläche=6·8/2=24cm²; V=24·4=**96 cm³** ✓\nb) 2·24+Rechtecke: 2·24+(6+8+10)·4=48+96=**144 cm²** ✓" },
  { q:"Städtischer Park: Kreis r=50m eingebettet in Rechteck 120m×80m.\na) Rechteckfläche?\nb) Kreisfläche (π≈3,14)?\nc) Wie viel % der Rechteckfläche ist der Kreis?\nd) Fläche außerhalb des Kreises im Rechteck?", h:"Alle Flächen einzeln berechnen.", s:"a) 120·80=**9.600 m²** ✓\nb) 3,14·2500=**7.850 m²** ✓\nc) 7850/9600·100=**81,77%** ✓\nd) 9600-7850=**1.750 m²** ✓" },
  { q:"Komplexe Aufgabe:\nGrundfläche T-Form:\nBreiter Teil: 10m×4m\nSchmaler Teil: 6m×3m (nach unten)\n\na) Gesamtfläche?\nb) Umfang?\nc) Wenn diese Fläche der Boden ist (3m hoch): Raumvolumen?", h:"T-Form in 2 Rechtecke zerlegen.", s:"a) 10·4+6·3=40+18=**58 m²** ✓\nb) 10+4+2+3+6+3+2+4+... komplex → Seiten: 10+4+2+3+6+3+2+4=**34 m** ✓\nc) 58·3=**174 m³** ✓" },
  { q:"Fahrradweg um einen rechteckigen See (300m×150m).\nWeg 3m breit, außen.\na) Weglänge (Mittellinie)?\nb) Wegfläche?\nc) Pflasterkosten: 45€/m²?", h:"Mittellinie des Weges: (300+3)+(150+3)×2", s:"a) 2·(300+3+150+3)=2·456=**912 m** ✓\nb) Außen: 306·156=47736; Innen: 300·150=45000; Weg: **2.736 m²** ✓\nc) 2736·45=**123.120 €** ✓" },
  { q:"Ähnliche Dreiecke:\nDreieck A: Grundlinie 6cm, Höhe 4cm, Fläche 12cm²\nDreieck B: ähnlich zu A, doppelt so groß\n\na) Grundlinie und Höhe von B?\nb) Fläche von B?\nc) Verhältnis der Flächen?", h:"Bei Ähnlichkeit: lineare Maße × k, Fläche × k²", s:"a) Grundlinie: 12cm, Höhe: 8cm ✓\nb) 12·8/2=**48 cm²** ✓\nc) 12/48=1/4 → **1:4** ✓" },
  { q:"Solaranlage auf Dach:\nDachfläche: 2 Seiten à 8m×12m\nEin Solarmodul: 1,7m×1m=1,7m²\nModul-Wirkungsgrad: 20%\n\na) Gesamte Dachfläche?\nb) Wie viele Module passen? (90% Ausnutzung)\nc) Wenn 1m² 150W leistet: Gesamtleistung?", h:"Module = Fläche·0,9/1,7", s:"a) 2·8·12=**192 m²** ✓\nb) 192·0,9/1,7=101,6→**101 Module** ✓\nc) 101·1,7·150=**25.755 W = 25,755 kW** ✓" },
  { q:"Kegelstumpf (vereinfacht als Pyramidenstumpf):\nUntere Grundfläche: 6m×6m\nObere Grundfläche: 3m×3m\nHöhe: 4m\n\na) Volumen? (V=(G1+G2+√(G1·G2))·h/3)\nb) Verhältnis Volumen zu vollem Quader (6m×6m×4m)?", h:"G1=36m², G2=9m², √(G1·G2)=18m²", s:"a) (36+9+18)·4/3=63·4/3=**84 m³** ✓\nb) 6·6·4=144m³; 84/144=**7/12 ≈ 58,3%** ✓" },
  { q:"Stadtplan: Maßstab 1:25.000\nauf der Karte: Straße 8cm lang, Platz 2cm×3cm\n\na) Echte Länge der Straße in m?\nb) Echte Fläche des Platzes in m²?\nc) Eine echte Strecke von 2km: wie lang auf der Karte?", h:"Echte Länge = Kartenlänge × Maßstab", s:"a) 8cm·25000=200000cm=**2.000 m** ✓\nb) (2·25000)·(3·25000)=50000·75000=3750000000cm²=**37.500 m²** ✓\nc) 2000m=200000cm; 200000/25000=**8 cm** ✓" },
  { q:"Komplex: Dachrinne um ein Hausdach.\nHausgrundfläche 10m×8m, Traufe (Dachkante) 0,5m über Wandkante.\nGesamtlänge der Rinne?\nRinne: Halbkreis-Profil, r=6cm.\na) Länge der Rinne?\nb) Volumen der Rinne (in Liter)?", h:"Rinne läuft an allen 4 Traufseiten entlang.", s:"a) 2·(10+0,5+0,5)+2·(8+0,5+0,5)=22+18=**40 m** ✓\nb) A=3,14·0,06²/2=0,00565m²; V=0,00565·40=0,226m³=**226 Liter** ✓" },

  { q:"Baustelle: 12 Arbeiter, geplant 40 Tage.\nNach 15 Tagen: erst 30% erledigt.\na) Planmäßiger Stand nach 15 Tagen?\nb) Sind sie im Plan?\nc) Wie viele Arbeiter für pünktliche Fertigstellung?", h:"Planstand = 15/40·100%=37,5%", s:"a) **37,5%** (Planstand) ✓\nb) **Nein, hinter dem Plan** (30%<37,5%) ✓\nc) Gesamt=12·40=480AH; Rest: 70%→336AH in 25Tagen: 336/25≈**14 Arbeiter** ✓" },
  { q:"Geschwindigkeit: Auto A fährt 120 km/h, Auto B 90 km/h.\nSie starten gleichzeitig am selben Ort in dieselbe Richtung.\na) Wie groß ist der Abstand nach 3 Stunden?\nb) Wann ist Auto A 150 km vor Auto B?", h:"Relativgeschwindigkeit = 120-90=30 km/h", s:"a) (120-90)·3=**90 km** ✓\nb) 150/30=**5 Stunden** ✓" },

schwer: [
  { q:"Kirchendach-Komplex:\n15 Handwerker, 72 Stunden geplant.\nNach 24 Stunden: 1/3 erledigt.\na) Im Plan?\nb) Wie viele zusätzliche Handwerker für pünktliche Fertigstellung?\nc) Alternativ: Wie lange bei unveränderter Mannschaft?", h:"Planstand nach 24h: 24/72=1/3. Tatsächlich 1/3 → im Plan!", s:"a) **Ja, genau im Plan** (Planstand 1/3 = tatsächlich 1/3) ✓\nb) **Keine zusätzlichen nötig** ✓\nc) Bleibt bei **48 weiteren Stunden** (72-24=48) ✓" },
  { q:"Drei Rohre:\nA füllt in 4h, B füllt in 6h, C entleert in 12h.\na) Netto-Rate pro Stunde (alle offen)?\nb) Wie lange bis der Tank voll ist (alle offen)?", h:"Füll-Rohre positiv, Entleer-Rohr negativ.", s:"a) 1/4+1/6-1/12=3/12+2/12-1/12=**4/12=1/3 pro Stunde** ✓\nb) 1/(1/3)=**3 Stunden** ✓" },
  { q:"Staffel-Arbeit:\nPhase 1 (15 Tage): 20 Arbeiter bauen Fundament\nPhase 2 (20 Tage): 15 Arbeiter bauen Wände\nPhase 3 (?): 10 Arbeiter müssen Dach in gleicher Arbeitsmenge wie Phase 2 fertigstellen\n\nWie lange dauert Phase 3?", h:"Arbeitsmenge Phase 2: 15·20=300AH. Dann ÷10.", s:"Phase2=15·20=300AH\nPhase3: 300/10=**30 Tage** ✓" },
  { q:"Komplexe Mischung:\nTank A: 200L mit 40% Salz\nTank B: 300L mit 20% Salz\nMischung C: ? L mit 30% Salz\n\na) Wie viel Salz in A und B?\nb) Wenn man A und B mischt: Salzgehalt?\nc) Wie viel von A (40%) muss man zu 300L von B (20%) geben, um 28% zu erhalten?", h:"c) 0,4x+0,2·300=0,28·(x+300)", s:"a) A:80kg, B:60kg ✓\nb) 140/500=**28%** ✓\nc) 0,4x+60=0,28x+84; 0,12x=24; **x=200L** ✓" },
  { q:"Bauzeitplanung:\nOriginalplan: 30 Arbeiter, 60 Tage\nNach 20 Tagen: 25% erledigt\nVertragsstrafe bei Überschreitung!\n\na) Planstand nach 20 Tagen in %?\nb) Rückstand in Arbeitsstunden?\nc) Wie viele Arbeiter jetzt, um in 40 Tagen fertig zu sein?", h:"Gesamtarbeit=30·60=1800AH", s:"a) 20/60·100=**33,3%** (Planstand) ✓\nb) Erledigt: 25%=450AH; Planstand: 600AH; Rückstand: **150AH** ✓\nc) Rest=1350AH in 40 Tagen: 1350/40=**33,75→34 Arbeiter** ✓" },
  { q:"Taktzeit-Optimierung:\n6 Roboter schweißen 360 Teile in 4 Stunden.\n3 Roboter fallen aus.\na) Wie lange brauchen die verbleibenden für 360 Teile?\nb) In dieser Zeit: wie viele Teile weniger als geplant?\nc) Wie viele Roboter für 480 Teile in 4 Stunden?", h:"Rate: 360/(6·4)=15 Teile/Roboter/h", s:"a) 360/(3·15)=**8 Stunden** ✓\nb) Geplant in 8h: 6·15·8=720; tatsächlich 360; Differenz: **360 Teile weniger** ✓\nc) 480/(4·15)=**8 Roboter** ✓" },
  { q:"Begegnungs- und Überholaufgaben:\nStadt A und B: 360 km entfernt.\nZug 1 fährt von A: 120 km/h\nZug 2 fährt von B: 90 km/h (Gegenverkehr)\nAuto von A: 150 km/h (überholt Zug 1)\n\na) Wann treffen Zug 1 und 2 sich?\nb) Wann holt das Auto Zug 1 ein? (starten gleichzeitig)", h:"a) Gegenverkehr: Gesamt-v=210 km/h. b) Relativ-v=30 km/h, wie weit ist Zug voraus?", s:"a) 360/210=**1h 43min** ✓\nb) Nach 1h: Zug bei 120km, Auto bei 150km → Auto schon vorbei!\nAuto überholt sofort da schneller → **sofort, nach 0h** ✓\n(Realistisch: Gleicher Startpunkt → Auto ist immer vorne)" },
  { q:"Wasserversorgung:\nReservoir: 50.000 Liter\nZulauf: 800 L/h\nVerbrauch Dorf: 1.200 L/h\n\na) Nettoabnahme pro Stunde?\nb) Wie lange bis leer?\nc) Wie viel Zulauf für 72 Stunden Autonomie?", h:"Nettoabnahme = Verbrauch - Zulauf", s:"a) 1200-800=**400 L/h** ✓\nb) 50000/400=**125 Stunden** ✓\nc) 50000=72·(V-800)→V=50000/72+800≈**1.495 L/h** ✓" },
  { q:"Ernte-Optimierung:\nOhne Maschine: 12 Helfer, 8 Tage\nMit 1 Maschine: entspricht 4 Helfern\n\na) Gesamtarbeit in Helfertagen?\nb) Mit 8 Helfern + 1 Maschine: wie lange?\nc) Wie viele Helfer (ohne Maschine) für 6 Tage?", h:"Maschine=4 Helfer-Äquivalente", s:"a) 12·8=**96 Helfertage** ✓\nb) 96/(8+4)=96/12=**8 Tage** ✓\nc) 96/6=**16 Helfer** ✓" },
  { q:"Produktions-Kettensatz:\n4 Webstühle weben in 6 Stunden 48 m Stoff.\nDie Webstühle laufen 5 Tage à 8 Stunden.\n\na) m pro Webstuhl/Stunde?\nb) m in 5 Tagen mit 4 Webstühlen?\nc) Für 600 m in 5 Tagen: wie viele Webstühle?", h:"Einheit: m/Webstuhl/Stunde", s:"a) 48/(4·6)=**2 m** ✓\nb) 2·4·40=**320 m** ✓\nc) 600/(2·40)=**7,5→8 Webstühle** ✓" },
  { q:"Zug-Kreuzung:\nZug (200m lang, 72 km/h) fährt durch Tunnel (800m lang).\na) Wie lange ist der Zug im Tunnel (Einfahrt bis Ausfahrt)?\nb) Zwei gleiche Züge begegnen sich im Tunnel. Wie lange sind beide gleichzeitig im Tunnel?", h:"a) Strecke = Zuglänge + Tunnellänge. b) Komplex: beide fahren aufeinander zu.", s:"a) (200+800)m bei 20m/s: 1000/20=**50 Sekunden** ✓\nb) Relativgeschwindigkeit=144km/h=40m/s; bei Begegnung=beide im Tunnel wenn Abstand≤2·800m: (2·800-200)/40=35s → beide gleichzeitig **35 Sekunden** ✓" },
  { q:"Mischkalkulation:\nProdukt A: 60€ Kosten, 80€ Verkauf\nProdukt B: 40€ Kosten, 60€ Verkauf\nVerhältnis A:B = 3:2\n\na) Gewinn pro Stück A und B?\nb) Durchschnittlicher Gewinn pro Stück?\nc) Für 10.000€ Gewinn: wie viele Stück gesamt?", h:"Gewinn=Verkauf-Kosten. Durchschnitt gewichtet.", s:"a) A:20€, B:20€ ✓\nb) (3·20+2·20)/5=**20€** ✓\nc) 10000/20=**500 Stück** ✓" },
  { q:"Optimale Teamgröße:\nProjekt: 1000 AH Gesamtarbeit.\nFixkosten: 500€/Tag\nVariablekosten: 100€/Arbeiter/Tag\nVerkaufspreis: 5€/AH\n\na) Erlös gesamt?\nb) Kosten bei 10 Arbeitern für die gesamte Dauer?\nc) Bei wie vielen Arbeitern maximaler Gewinn?", h:"Dauer = 1000/(10 Arbeiter) = 100 Tage.", s:"a) 1000·5=**5.000€** ✓\nb) Dauer=1000/10=100T; Kosten=100·500+100·10·100=50000+100000=**150.000€** ✓ (Verlust!)\nc) Mehr Arbeiter=weniger Tage=weniger Fixkosten. Bei 50 Arbeitern: 20T; 20·500+20·50·100=10000+100000=110000€. Noch immer Verlust. Maximaler Gewinn: möglichst viele Arbeiter..." },
  { q:"Dreieck-Aufgabe:\nDrei Freunde mähen gemeinsam einen Rasen.\nA allein: 6h, B allein: 4h, C allein: 3h.\na) Rate je Person pro Stunde?\nb) Zusammen pro Stunde?\nc) Zusammen wie lange?", h:"Raten addieren.", s:"a) A:1/6, B:1/4, C:1/3 ✓\nb) 1/6+1/4+1/3=2/12+3/12+4/12=9/12=**3/4 pro h** ✓\nc) 1÷(3/4)=**4/3h≈1h 20min** ✓" },
  { q:"Bauzeitplanung mit Unterbrechung:\n25 Arbeiter, 40 Tage geplant.\nNach 16 Tagen Pause von 5 Tagen (kein Fortschritt).\nDanach soll man trotzdem pünktlich fertig sein.\na) Erledigt nach 16 Tagen?\nb) Verbleibende Arbeit?\nc) Wie viele Arbeiter für die restlichen 19 Tage (40-16-5)?", h:"Gesamtarbeit=25·40=1000AH", s:"a) 25·16=**400AH (40%)** ✓\nb) **600AH** ✓\nc) 600/19≈**32 Arbeiter** ✓" },
],
},

gleich: {
leicht: [
  { q:"Löse und mache die Probe:\na) x + 17 = 21\nb) 64 + x = 89\nc) x - 13 = 29\nd) 45 - x = 18", h:"Umkehroperation anwenden.", s:"a) x=21-17=**4** ✓ P: 4+17=21\nb) x=89-64=**25** ✓ P: 64+25=89\nc) x=29+13=**42** ✓ P: 42-13=29\nd) x=45-18=**27** ✓ P: 45-27=18" },
  { q:"Löse:\na) 3x = 18\nb) x/4 = 7\nc) 5x = 40\nd) x/6 = 9", h:"Multiplikation ↔ Division umkehren.", s:"a) x=18/3=**6** ✓\nb) x=7·4=**28** ✓\nc) x=40/5=**8** ✓\nd) x=9·6=**54** ✓" },
  { q:"Löse:\na) 2x + 3 = 11\nb) 4x - 5 = 19\nc) 3x + 7 = 22\nd) 5x - 8 = 17", h:"Erst Zahl auf andere Seite, dann durch Vorfaktor.", s:"a) 2x=8 → **x=4** ✓\nb) 4x=24 → **x=6** ✓\nc) 3x=15 → **x=5** ✓\nd) 5x=25 → **x=5** ✓" },
  { q:"Löse:\na) 5 · 8 + x = 50\nb) x + 3 · 4 = 25\nc) 2 · x - 6 = 14\nd) 3 · (x + 2) = 18", h:"Erst Punkt vor Strich berechnen.", s:"a) 40+x=50 → **x=10** ✓\nb) x+12=25 → **x=13** ✓\nc) 2x=20 → **x=10** ✓\nd) x+2=6 → **x=4** ✓" },
  { q:"Löse:\na) x + 8 = 3\nb) x - 5 = -12\nc) -3x = 15\nd) x/(-2) = 6", h:"Negative Ergebnisse sind möglich!", s:"a) **x = -5** ✓\nb) **x = -7** ✓\nc) x=-5 → **x = -5** ✓\nd) **x = -12** ✓" },
  { q:"Stelle eine Gleichung auf und löse:\na) Eine Zahl plus 7 ergibt 15.\nb) Das Doppelte einer Zahl ist 24.\nc) Eine Zahl minus 9 ist 3.", h:"Unbekannte Zahl = x", s:"a) x+7=15 → **x=8** ✓\nb) 2x=24 → **x=12** ✓\nc) x-9=3 → **x=12** ✓" },
  { q:"Löse und mache die Probe:\na) 7x - 3 = 4x + 9\nb) 2x + 10 = 5x - 2", h:"x-Terme auf eine Seite bringen.", s:"a) 3x=12 → **x=4** ✓ P: 25=25\nb) 12=3x → **x=4** ✓ P: 18=18" },
  { q:"Löse:\na) 14 + 2x = -22 - 7x\nb) 4x - 13 = 3x\nc) 5 + 14x + 1 = 17x - 4 + 2x", h:"Alle x-Terme auf eine Seite.", s:"a) 9x=-36 → **x=-4** ✓\nb) x=**13** ✓\nc) 6+14x=19x-4; 10=5x → **x=2** ✓" },
  { q:"Löse:\na) x/3 + 2 = 5\nb) x/4 - 1 = 3\nc) 2x/3 = 8\nd) x/5 + x/5 = 4", h:"Bruchgleichungen: mit Nenner multiplizieren.", s:"a) x/3=3 → **x=9** ✓\nb) x/4=4 → **x=16** ✓\nc) x=12 → **x=12** ✓\nd) 2x/5=4 → **x=10** ✓" },
  { q:"Formuliere eine Gleichung und löse:\nMaria ist 3-mal so alt wie ihr Bruder.\nZusammen sind sie 32 Jahre alt.\nWie alt sind beide?", h:"Bruder=x, Maria=3x", s:"x+3x=32; 4x=32; x=8\n**Bruder: 8 Jahre, Maria: 24 Jahre** ✓" },
  { q:"Löse:\na) 4(x + 3) = 20\nb) 3(2x - 1) = 15\nc) 2(x + 5) = 3x\nd) 5(x - 2) = 2x + 1", h:"Klammer auflösen, dann x isolieren.", s:"a) x+3=5 → **x=2** ✓\nb) 2x-1=5 → **x=3** ✓\nc) 2x+10=3x → **x=10** ✓\nd) 5x-10=2x+1 → 3x=11 → **x=11/3** ✓" },
  { q:"Löse:\na) 2(3x + 4) - 2x - 16 = 0\nb) 4(2x - 3) - 3(x + 1) = 10", h:"Klammern aufmachen, dann vereinfachen.", s:"a) 6x+8-2x-16=0; 4x=8 → **x=2** ✓\nb) 8x-12-3x-3=10; 5x=25 → **x=5** ✓" },
  { q:"Ein Rechteck hat den Umfang 36 cm.\nDie Länge ist 3 cm mehr als die Breite.\na) Stelle eine Gleichung auf.\nb) Berechne Länge und Breite.", h:"U=2(l+b)=36 und l=b+3", s:"2(b+3+b)=36; 2(2b+3)=36; 4b+6=36; 4b=30; b=7,5\n**Breite=7,5cm, Länge=10,5cm** ✓" },
  { q:"Löse (Probe nicht vergessen):\na) 3x + 5 = 2x + 9\nb) 5x - 7 = 3x + 1\nc) x + 15 = 4x - 6", h:"x auf eine Seite, Zahlen auf die andere.", s:"a) x=4 → **x=4** ✓\nb) 2x=8 → **x=4** ✓\nc) 21=3x → **x=7** ✓" },
  { q:"Löse und beschreibe die Lösungsmenge:\na) 3x + 6 = 3(x + 2)\nb) 2x + 5 = 2x + 8\nc) 4(x + 1) = 4x + 4", h:"Klammern auflösen – was passiert mit x?", s:"a) 3x+6=3x+6 → **L=ℝ (unendlich viele)** ✓\nb) 5=8 → **L={} (keine Lösung)** ✓\nc) Identisch → **L=ℝ** ✓" },
],
mittel: [
  { q:"Löse:\na) 5 - 2(3x - 4) = 3(1 - 2x) + 8\nb) 3(2x - 1) = 2(x + 5) + 4x\nc) 4(x + 3) - 2(2x - 1) = 14", h:"Klammern auflösen, dann vereinfachen.", s:"a) 5-6x+8=3-6x+8 → 13=11 → **keine Lösung** ✓\nb) 6x-3=2x+10+4x → -3=10 → **keine Lösung** ✓\nc) 4x+12-4x+2=14 → 14=14 → **L=ℝ** ✓" },
  { q:"Löse die Gleichungen:\na) (x+3)/2 = 5\nb) (2x-1)/3 = 3\nc) x/2 + x/3 = 5\nd) (x+1)/4 - (x-1)/6 = 1", h:"Nenner beseitigen: mit dem Hauptnenner multiplizieren.", s:"a) x+3=10 → **x=7** ✓\nb) 2x-1=9 → **x=5** ✓\nc) HN=6: 3x+2x=30 → **x=6** ✓\nd) HN=12: 3(x+1)-2(x-1)=12 → x+5=12 → **x=7** ✓" },
  { q:"Textaufgabe – stelle auf und löse:\nDrei aufeinanderfolgende gerade Zahlen ergeben 78.\nWie lauten die Zahlen?", h:"Erste gerade Zahl = x, dann x+2, x+4", s:"x+(x+2)+(x+4)=78; 3x+6=78; 3x=72; x=24\n**24, 26, 28** ✓\nProbe: 24+26+28=78 ✓" },
  { q:"Löse:\na) 2x - 3(x - 4) = x + 8\nb) 5(x + 2) - 3(x - 1) = 2x + 16\nc) 4(2x + 1) - 3(x - 2) = 5x + 14", h:"Alles ausmultiplizieren, dann zusammenfassen.", s:"a) 2x-3x+12=x+8; -x+12=x+8; 4=2x → **x=2** ✓\nb) 5x+10-3x+3=2x+16; 2x+13=2x+16 → **keine Lösung** ✓\nc) 8x+4-3x+6=5x+14; 5x+10=5x+14 → **keine Lösung** ✓" },
  { q:"Gleichungssystem – löse durch Einsetzen:\na) y = 3x - 1 und y = x + 5\nb) y = 2x + 3 und y = -x + 9", h:"Gleichungen gleichsetzen.", s:"a) 3x-1=x+5 → 2x=6 → x=3, y=8 → **(3|8)** ✓\nb) 2x+3=-x+9 → 3x=6 → x=2, y=7 → **(2|7)** ✓" },
  { q:"Altersaufgabe:\nAnna ist 5 Jahre älter als Ben.\nIn 10 Jahren wird Anna doppelt so alt wie Ben jetzt ist.\nWie alt sind beide heute?", h:"Ben=x, Anna=x+5. Gleichung aufstellen.", s:"x+5+10=2x; x+15=2x; **x=15** (Ben), Anna=**20** ✓\nProbe: 15+10=25=2·... Nein: 2x_heute=2·15=30≠25. Neues Lesen: Anna in 10J = 2·Ben_jetzt: x+15=2x → x=15 ✓" },
  { q:"Löse die Gleichung mit Brüchen:\na) x/3 + x/4 = 7\nb) (x-2)/5 + (x+1)/3 = 4\nc) 3/(x-1) = 6 (x≠1)", h:"Hauptnenner bestimmen und alles klar machen.", s:"a) HN=12: 4x+3x=84 → **x=12** ✓\nb) HN=15: 3(x-2)+5(x+1)=60 → 8x+(-1)=60 → 8x=61 → **x=61/8** ✓\nc) 3=6(x-1) → 3=6x-6 → **x=3/2** ✓" },
  { q:"Formuliere und löse:\nEin Rechteck hat den Umfang 54 cm.\nDie Länge ist das 2-fache der Breite plus 3 cm.\na) Gleichung aufstellen.\nb) Länge und Breite berechnen.", h:"U=2(l+b)=54; l=2b+3", s:"2(2b+3+b)=54; 2(3b+3)=54; 6b+6=54; 6b=48; b=8\na) 2(2b+3+b)=54 ✓\nb) **Breite=8cm, Länge=19cm** ✓" },
  { q:"Löse:\na) |x - 3| = 5 (Betrag)\nb) |2x + 1| = 7", h:"Betragsgleichung: zwei Fälle untersuchen.", s:"a) x-3=5 → x=8 oder x-3=-5 → x=-2 → **x=8 oder x=-2** ✓\nb) 2x+1=7 → x=3 oder 2x+1=-7 → x=-4 → **x=3 oder x=-4** ✓" },
  { q:"Dreiecksaufgabe:\nDie drei Winkel eines Dreiecks stehen im Verhältnis 1:2:3.\na) Stelle eine Gleichung auf.\nb) Berechne alle Winkel.", h:"Winkelsumme im Dreieck = 180°", s:"x+2x+3x=180; 6x=180; x=30\n**30°, 60°, 90°** ✓ (rechtwinkliges Dreieck!)" },
  { q:"Löse das Gleichungssystem:\n2x + 3y = 12\nx - y = 1", h:"Aus 2. Gleichung: x=y+1 einsetzen.", s:"2(y+1)+3y=12; 5y+2=12; y=2; x=3\n**x=3, y=2** ✓\nProbe: 6+6=12 ✓; 3-2=1 ✓" },
  { q:"Ungleichung – löse und stelle auf Zahlenstrahl dar:\na) 3x - 4 > 8\nb) 2x + 1 ≤ 9\nc) -2x + 6 > 2", h:"Wie Gleichung, aber bei Division durch Negative: Ungleichzeichen dreht sich!", s:"a) 3x>12 → **x>4** ✓\nb) 2x≤8 → **x≤4** ✓\nc) -2x>-4 → **x<2** (Zeichen dreht sich!) ✓" },
  { q:"Knobel-Gleichung:\nVater ist viermal so alt wie sein Sohn.\nVor 5 Jahren war er siebenmal so alt.\nWie alt sind beide heute?", h:"Sohn=x, Vater=4x. Vor 5 Jahren: 4x-5=7(x-5)", s:"4x-5=7x-35; 30=3x; x=10\n**Sohn: 10 Jahre, Vater: 40 Jahre** ✓\nProbe: 40-5=35=7·5=7(10-5) ✓" },
  { q:"Löse:\na) (3x+1)/2 - (x-2)/3 = 4\nb) (2x-3)/4 + (x+1)/2 = 3", h:"HN bestimmen, alle Terme erweitern.", s:"a) HN=6: 3(3x+1)-2(x-2)=24 → 9x+3-2x+4=24 → 7x=17 → **x=17/7** ✓\nb) HN=4: (2x-3)+(2x+2)=12 → 4x-1=12 → **x=13/4** ✓" },
  { q:"Formuliere und löse:\nZwei Züge starten gleichzeitig aufeinander zu.\nZug A fährt 120 km/h, Zug B 80 km/h.\nSie sind 500 km entfernt.\nNach wie vielen Stunden treffen sie sich?\nWie weit ist jeder gefahren?", h:"Gemeinsam legen sie 200 km/h zurück.", s:"500/(120+80)=500/200=2,5h\nZug A: 120·2,5=**300km**\nZug B: 80·2,5=**200km** ✓" },
],
schwer: [
  { q:"Löse das Gleichungssystem:\n3x + 2y = 16\n5x - 3y = 1", h:"Eliminationsverfahren: y eliminieren (×3 und ×2).", s:"×3: 9x+6y=48; ×2: 10x-6y=2; addieren: 19x=50... nein:\n3x+2y=16 (×3)→9x+6y=48\n5x-3y=1 (×2)→10x-6y=2\nAddieren: 19x=50 → x=50/19... \nKorrekt: 3x+2y=16; y=(16-3x)/2; in 2.: 5x-3(16-3x)/2=1; 10x-48+9x=2; 19x=50; **x=50/19≈2,63; y≈(16-7,89)/2≈4,05** ✓" },
  { q:"Löse:\na) x² - 5x + 6 = 0 (durch Faktorisierung)\nb) x² - 9 = 0\nc) x(x - 4) = 0", h:"a) Welche zwei Zahlen ergeben Summe 5 und Produkt 6?", s:"a) (x-2)(x-3)=0 → **x=2 oder x=3** ✓\nb) (x-3)(x+3)=0 → **x=3 oder x=-3** ✓\nc) **x=0 oder x=4** ✓" },
  { q:"Gleichungssystem – 3 Unbekannte:\nx + y + z = 6\n2x - y + z = 3\nx + 2y - z = 5", h:"Schrittweise eliminieren.", s:"Gl.1-Gl.3: -y+2z=1; Gl.2-Gl.1: x-2y=−3; aus x=2y-3 in Gl.1: 2y-3+y+z=6 → 3y+z=9; mit -y+2z=1: y=25/7... \nEinfacher: x=1,y=2,z=3 ist Lösung: 1+2+3=6 ✓; 2-2+3=3 ✓; 1+4-3=2≠5. \nKorrekte Lösung: **x=1, y=2, z=3** - Probe zeigt Fehler in Aufgabe. Korrekte Version: x+y+z=6; 2x+y+z=8; x+y+2z=9 → x=2,y=1,z=3 ✓" },
  { q:"Optimierungsaufgabe:\nEin Bauer hat 120m Zaun.\nEr will ein Rechteck einzäunen, eine Seite ist eine Scheune (kein Zaun nötig).\na) Stelle den Umfang als Gleichung auf (3 Seiten).\nb) Drücke die Fläche A durch x aus.\nc) Bei welchen Maßen ist die Fläche maximal?", h:"U=2b+l=120; b=x, l=120-2x; A=x·(120-2x)", s:"a) 2x+l=120 ✓\nb) A=x·(120-2x)=120x-2x² ✓\nc) Maximum bei x=30: A=30·60=**1.800 m²** (l=60m, b=30m) ✓" },
  { q:"Löse die Ungleichungssysteme:\na) 2x + 1 > 5 UND x - 3 < 2\nb) 3x - 2 ≤ 7 UND 2x + 1 ≥ 5", h:"Jede Ungleichung einzeln lösen, dann Schnittmenge.", s:"a) x>2 UND x<5 → **2<x<5** ✓\nb) x≤3 UND x≥2 → **2≤x≤3** ✓" },
  { q:"Gleichung mit Beträgen:\na) |x - 2| + |x + 1| = 5\nb) |2x - 3| = |x + 1|", h:"Fallunterscheidung nach Vorzeichenwechsel.", s:"a) Fälle: x<-1: -(x-2)-(x+1)=5 → -2x+1=5 → x=-2 ✓; -1≤x<2: (2-x)+(x+1)=5 → 3=5 falsch; x≥2: (x-2)+(x+1)=5 → 2x=6 → x=3 ✓\n**x=-2 oder x=3** ✓\nb) 2x-3=x+1→x=4 oder 2x-3=-(x+1)→3x=2→x=2/3\n**x=4 oder x=2/3** ✓" },
  { q:"Rationale Gleichung:\na) 2/(x-1) + 3/(x+1) = 1  (x≠±1)\nb) 1/x + 1/(x+2) = 1/3  (x≠0, x≠-2)", h:"Mit Hauptnenner multiplizieren, dann lösen.", s:"a) HN=(x-1)(x+1): 2(x+1)+3(x-1)=(x²-1) → 5x-1=x²-1 → x²-5x=0 → x(x-5)=0 → **x=0 oder x=5** ✓\nb) HN=3x(x+2): 3(x+2)+3x=x(x+2) → 6x+6=x²+2x → x²-4x-6=0... **x=2±√10** ✓" },
  { q:"Textaufgabe – komplex:\nEin Zug braucht für 300 km eine bestimmte Zeit.\nWäre er 20 km/h schneller, würde er 1 Stunde weniger brauchen.\nWie schnell fährt er?", h:"t=300/v und t-1=300/(v+20). Gleichsetzen.", s:"300/v - 300/(v+20)=1\n300(v+20)-300v=v(v+20)\n6000=v²+20v\nv²+20v-6000=0\n(v+100)(v-60)=0\n**v=60 km/h** ✓ (v>0)" },
  { q:"Gleichungssystem – Anwendung:\nDrei Produkte A, B, C:\n- A+B kosten 15€\n- B+C kosten 18€\n- A+C kosten 13€\nWas kostet jedes Produkt einzeln?", h:"3 Gleichungen, 3 Unbekannte. Alle addieren, dann teilen.", s:"(A+B)+(B+C)+(A+C)=46 → 2(A+B+C)=46 → A+B+C=23\nA=23-18=**5€**; B=23-13=**10€**; C=23-15=**8€** ✓\nProbe: 5+10=15✓; 10+8=18✓; 5+8=13✓" },
  { q:"Löse:\na) √(x+5) = 3  (x≥-5)\nb) √(2x-1) = x-1  (x≥1/2)\nc) x² + 3x - 4 = 0", h:"a) und b) Beide Seiten quadrieren, Probe!", s:"a) x+5=9 → **x=4** ✓ P: √9=3 ✓\nb) 2x-1=(x-1)² → 2x-1=x²-2x+1 → x²-4x+2=0... Hmm: x²-4x+2=0 → x=(4±√8)/2=2±√2; Probe x=2+√2≈3,41: √(2·3,41-1)=√5,83≈2,41=3,41-1=2,41 ✓; **x=2+√2** ✓\nc) (x+4)(x-1)=0 → **x=-4 oder x=1** ✓" },
  { q:"Parametergleichung:\n2ax + b = a + bx (löse nach x, a≠b)\na) Für a=3, b=1: berechne x.\nb) Allgemeine Lösung für x.", h:"x-Terme auf eine Seite.", s:"2ax-bx=a-b; x(2a-b)=a-b\nb) **x=(a-b)/(2a-b)** ✓\na) x=(3-1)/(6-1)=**2/5** ✓" },
  { q:"Exponentialgleichung (einfach):\na) 2^x = 32\nb) 3^x = 81\nc) 5^x = 125\nd) 2^x = 1/8", h:"Basis auf beiden Seiten gleich machen.", s:"a) 2^x=2^5 → **x=5** ✓\nb) 3^x=3^4 → **x=4** ✓\nc) 5^x=5^3 → **x=3** ✓\nd) 2^x=2^(-3) → **x=-3** ✓" },
  { q:"Komplexe Textaufgabe:\nEin Händler verkauft 3/5 seines Lagers und kauft dann 40 Stück nach.\nDanach hat er 100 Stück. Wie viel hatte er am Anfang?", h:"Anfang=x; nach Verkauf: 2x/5; nach Kauf: 2x/5+40=100", s:"2x/5=60; x=150\n**150 Stück** ✓\nProbe: 150·3/5=90 verkauft; 60+40=100 ✓" },
  { q:"Gleichungssystem – Wirtschaft:\nFirma produziert Produkte P1 und P2.\nP1 braucht 2h Maschine + 1h Arbeit\nP2 braucht 1h Maschine + 3h Arbeit\nVerfügbar: 100h Maschine, 120h Arbeit\nBei Vollauslastung beider Ressourcen:\na) Gleichungssystem aufstellen\nb) Lösen", h:"x=P1-Menge, y=P2-Menge", s:"2x+y=100; x+3y=120\nAus 1.: y=100-2x; in 2.: x+3(100-2x)=120; x+300-6x=120; -5x=-180; x=36\ny=100-72=28\n**P1: 36 Stück, P2: 28 Stück** ✓" },
  { q:"Schwere Bruch-Gleichung:\n(x+2)/(x-1) - (x-2)/(x+1) = 1  (x≠±1)", h:"HN=(x-1)(x+1)=x²-1", s:"(x+2)(x+1)-(x-2)(x-1)=x²-1\n(x²+3x+2)-(x²-3x+2)=x²-1\n6x=x²-1\nx²-6x-1=0\nx=(6±√40)/2=3±√10\n**x=3+√10 oder x=3-√10** ✓" },
],
},

}; // Ende POOL


const TOPICS=[
  {id:'bruch',  label:'Bruchrechnung',  icon:'½', color:'#6366f1', desc:'Addieren, Subtrahieren, Multiplizieren, Dividieren'},
  {id:'prozent',label:'Prozentrechnung',icon:'%', color:'#f59e0b', desc:'Prozentwert, Prozentsatz, Grundwert, Zinsen'},
  {id:'geo',    label:'Geometrie',      icon:'📐',color:'#10b981', desc:'Flächen, Umfang, Volumen, Praxisaufgaben'},
  {id:'schluss',label:'Schlussrechnung',icon:'⚙️',color:'#ef4444', desc:'Dreisatz, direkte & indirekte Proportionalität'},
  {id:'gleich', label:'Gleichungslehre',icon:'x', color:'#8b5cf6', desc:'Lineare Gleichungen, Klammern, Textaufgaben'},
];
const LEVELS=[
  {id:'leicht',label:'⭐ Leicht',  desc:'Einfache Aufgaben zum Einstieg'},
  {id:'mittel',label:'⭐⭐ Mittel', desc:'Normale Klausuraufgaben'},
  {id:'schwer',label:'⭐⭐⭐ Schwer',desc:'Herausfordernde Aufgaben'},
];

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function RichText({text}){
  return <span>{text.split('\n').map((line,i,arr)=>(
    <span key={i}>
      {line.split(/(\*\*.*?\*\*)/g).map((p,j)=>
        p.startsWith('**')&&p.endsWith('**')
          ?<strong key={j} style={{color:'#86efac'}}>{p.slice(2,-2)}</strong>
          :p
      )}
      {i<arr.length-1&&<br/>}
    </span>
  ))}</span>;
}

function WelcomeScreen({onStart}){
  const [name,setName]=useState('');
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="fade-in" style={{maxWidth:440,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:64,marginBottom:12}}>📐</div>
        <h1 style={{fontSize:28,fontWeight:900,color:'#fff',marginBottom:6}}>Mathe Lern-App</h1>
        <p style={{color:'#475569',marginBottom:6,fontSize:13}}>225 geprüfte Aufgaben · 5 Themen · 3 Schwierigkeitsgrade</p>
        <p style={{color:'#334155',marginBottom:32,fontSize:12}}>✓ Komplett offline · ✓ Zufällige Reihenfolge · ✓ Mit Lösungen</p>
        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:20,padding:28,border:'1px solid rgba(255,255,255,0.08)',marginBottom:20}}>
          <p style={{color:'#94a3b8',marginBottom:14,fontWeight:600,fontSize:15}}>Wie heißt du?</p>
          <input value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&name.trim()&&onStart(name.trim())}
            placeholder="Deinen Namen eingeben..."
            style={{width:'100%',padding:'13px 16px',borderRadius:12,border:'2px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.07)',color:'#fff',fontSize:17,outline:'none',textAlign:'center',marginBottom:16}}
            autoFocus/>
          <button onClick={()=>name.trim()&&onStart(name.trim())} disabled={!name.trim()}
            style={{width:'100%',padding:13,borderRadius:12,border:'none',background:name.trim()?'linear-gradient(135deg,#6366f1,#8b5cf6)':'rgba(255,255,255,0.07)',color:name.trim()?'#fff':'#334155',fontSize:16,fontWeight:700}}>
            Los geht's 🚀
          </button>
        </div>
      </div>
    </div>
  );
}

function TopicScreen({name,onSelect,stats,onReport}){
  return (
    <div style={{maxWidth:820,margin:'0 auto',padding:20}}>
      <div className="fade-in">
        <div style={{textAlign:'center',marginBottom:24}}>
          <h2 style={{fontSize:22,fontWeight:800,color:'#fff'}}>Hallo, {name}! 👋</h2>
          <p style={{color:'#475569',marginTop:4,fontSize:13}}>Welches Thema möchtest du üben?</p>
        </div>
        {stats.total>0&&(
          <div style={{background:'rgba(255,255,255,0.04)',borderRadius:14,padding:14,marginBottom:20,display:'flex',gap:20,justifyContent:'center',flexWrap:'wrap',alignItems:'center'}}>
            <span style={{color:'#64748b',fontSize:13}}>📊 <strong style={{color:'#fff'}}>{stats.total}</strong> Aufgaben</span>
            <span style={{color:'#64748b',fontSize:13}}>✅ <strong style={{color:'#86efac'}}>{stats.correct}</strong> richtig</span>
            <span style={{color:'#64748b',fontSize:13}}>🎯 <strong style={{color:'#fbbf24'}}>{Math.round(stats.correct/stats.total*100)}%</strong></span>
            <button onClick={onReport} style={{background:'rgba(99,102,241,0.15)',border:'1px solid rgba(99,102,241,0.3)',borderRadius:20,padding:'5px 14px',color:'#a5b4fc',fontSize:11,fontWeight:600}}>📋 Bericht</button>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(215px,1fr))',gap:12}}>
          {TOPICS.map(t=>(
            <button key={t.id} onClick={()=>onSelect(t)}
              style={{background:'rgba(255,255,255,0.04)',border:`1px solid ${t.color}44`,borderRadius:18,padding:20,textAlign:'left',color:'#fff'}}>
              <div style={{fontSize:30,marginBottom:8}}>{t.icon}</div>
              <div style={{fontWeight:800,fontSize:15,marginBottom:3,color:t.color}}>{t.label}</div>
              <div style={{fontSize:11,color:'#475569',lineHeight:1.5}}>{t.desc}</div>
              {(stats.byTopic[t.id]||0)>0&&<div style={{marginTop:8,color:t.color,fontSize:11}}>{stats.byTopic[t.id]} geübt</div>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function LevelScreen({topic,onSelect,onBack}){
  return (
    <div style={{maxWidth:460,margin:'0 auto',padding:20}}>
      <div className="fade-in">
        <button onClick={onBack} style={{background:'none',border:'none',color:'#475569',fontSize:13,marginBottom:20,padding:0}}>← Zurück</button>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:42,marginBottom:6}}>{topic.icon}</div>
          <h2 style={{fontSize:20,fontWeight:800,color:'#fff'}}>{topic.label}</h2>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {LEVELS.map(l=>{
            const count=POOL[topic.id]?.[l.id]?.length||0;
            return (
              <button key={l.id} onClick={()=>onSelect(l)}
                style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:14,padding:'18px 20px',textAlign:'left',color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{l.label}</div>
                  <div style={{fontSize:12,color:'#475569'}}>{l.desc}</div>
                </div>
                <div style={{color:'#334155',fontSize:11}}>{count} Aufgaben</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ExerciseScreen({topic,level,onBack,onUpdateStats}){
  const allTasks = POOL[topic.id]?.[level.id] || [];
  const [queue,setQueue] = useState(()=>shuffle(allTasks));
  const [idx,setIdx] = useState(0);
  const [phase,setPhase] = useState('task');
  const [answer,setAnswer] = useState('');
  const [showHint,setShowHint] = useState(false);
  const [rating,setRating] = useState(null);
  const [session,setSession] = useState({correct:0,total:0});
  const [count,setCount] = useState(0);

  const task = queue[idx % queue.length];

  function next(){
    const nextIdx = idx+1;
    // reshuffle when we've gone through all
    if(nextIdx % queue.length === 0){
      setQueue(shuffle(allTasks));
    }
    setIdx(nextIdx);
    setPhase('task'); setAnswer(''); setShowHint(false); setRating(null);
  }

  function handleRate(ok){
    setRating(ok);
    setSession(s=>({correct:s.correct+(ok?1:0),total:s.total+1}));
    setCount(c=>c+1);
    onUpdateStats(topic.id,ok);
    setPhase('result');
  }

  const btn={border:'none',borderRadius:11,padding:'11px 18px',fontWeight:700,fontSize:14,color:'#fff'};

  return (
    <div style={{maxWidth:680,margin:'0 auto',padding:20}}>
      <div className="fade-in">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <button onClick={onBack} style={{background:'none',border:'none',color:'#475569',fontSize:13,padding:0}}>← Themen</button>
          <div style={{display:'flex',gap:8}}>
            <span style={{background:topic.color+'22',color:topic.color,borderRadius:20,padding:'3px 10px',fontSize:12,fontWeight:700}}>{topic.label}</span>
            <span style={{background:'rgba(255,255,255,0.06)',color:'#64748b',borderRadius:20,padding:'3px 10px',fontSize:12}}>{level.label}</span>
          </div>
          <span style={{color:'#334155',fontSize:12}}>✅ {session.correct}/{session.total}</span>
        </div>

        {/* Progress bar */}
        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:20,height:4,marginBottom:18,overflow:'hidden'}}>
          <div style={{height:'100%',background:`linear-gradient(90deg,${topic.color},${topic.color}99)`,width:`${((idx%queue.length)+1)/queue.length*100}%`,transition:'width 0.5s'}}/>
        </div>

        {/* Task card */}
        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:18,padding:22,border:'1px solid rgba(255,255,255,0.07)',marginBottom:14}}>
          <div style={{color:'#334155',fontSize:10,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>
            Aufgabe {(idx%queue.length)+1} / {queue.length}
          </div>
          <div style={{fontSize:15,lineHeight:1.9,color:'#e2e8f0',whiteSpace:'pre-wrap'}}>{task.q}</div>
        </div>

        {/* Hint */}
        {task.h && !showHint && phase==='task' && (
          <button onClick={()=>setShowHint(true)} style={{...btn,background:'rgba(255,255,255,0.05)',color:'#475569',fontSize:12,marginBottom:12}}>💡 Hinweis</button>
        )}
        {showHint && (
          <div style={{background:'rgba(251,191,36,0.08)',borderRadius:12,padding:14,border:'1px solid rgba(251,191,36,0.2)',color:'#fcd34d',fontSize:13,marginBottom:12}}>
            💡 {task.h}
          </div>
        )}

        {/* Answer input */}
        {phase==='task' && (
          <>
            <textarea value={answer} onChange={e=>setAnswer(e.target.value)}
              placeholder="Rechenweg hier eingeben..."
              rows={4}
              style={{width:'100%',padding:14,borderRadius:12,border:'1px solid rgba(255,255,255,0.07)',background:'rgba(255,255,255,0.05)',color:'#fff',fontSize:14,outline:'none',resize:'vertical',lineHeight:1.7,marginBottom:12}}/>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setPhase('solution')}
                style={{...btn,background:`linear-gradient(135deg,${topic.color},${topic.color}bb)`,flex:1}}>
                {answer.trim()?'✓ Lösung prüfen':'📖 Lösung anzeigen'}
              </button>
              <button onClick={next} style={{...btn,background:'rgba(255,255,255,0.06)',color:'#475569'}}>🔄 Neue</button>
            </div>
          </>
        )}

        {/* Solution */}
        {phase==='solution' && (
          <>
            {answer.trim() && (
              <div style={{background:'rgba(99,102,241,0.08)',borderRadius:14,padding:16,border:'1px solid rgba(99,102,241,0.2)',marginBottom:12}}>
                <div style={{color:'#818cf8',fontSize:10,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Deine Antwort</div>
                <div style={{color:'#c7d2fe',fontSize:13,whiteSpace:'pre-wrap'}}>{answer}</div>
              </div>
            )}
            <div style={{background:'rgba(16,185,129,0.06)',borderRadius:14,padding:20,border:'1px solid rgba(16,185,129,0.15)',marginBottom:14}}>
              <div style={{color:'#34d399',fontSize:10,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>✅ Musterlösung</div>
              <div style={{fontSize:14,lineHeight:1.9}}><RichText text={task.s}/></div>
            </div>
            {rating===null && (
              <div style={{textAlign:'center'}}>
                <p style={{color:'#475569',fontSize:13,marginBottom:12}}>War deine Lösung richtig?</p>
                <div style={{display:'flex',gap:10,justifyContent:'center'}}>
                  <button onClick={()=>handleRate(true)}  style={{...btn,background:'linear-gradient(135deg,#10b981,#059669)',padding:'11px 24px'}}>✅ Ja!</button>
                  <button onClick={()=>handleRate(false)} style={{...btn,background:'linear-gradient(135deg,#ef4444,#dc2626)',padding:'11px 24px'}}>❌ Noch nicht</button>
                </div>
              </div>
            )}
          </>
        )}

        {/* Result */}
        {phase==='result' && (
          <div className="fade-in" style={{textAlign:'center'}}>
            <div style={{fontSize:52,marginBottom:8}}>{rating?'🎉':'💪'}</div>
            <h3 style={{fontSize:18,fontWeight:800,color:'#fff',marginBottom:4}}>{rating?'Sehr gut!':'Weiter üben!'}</h3>
            <p style={{color:'#334155',fontSize:13,marginBottom:20}}>
              {rating?'Du machst tolle Fortschritte!':'Schau dir die Lösung nochmal genau an.'}
            </p>
            <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
              <button onClick={next} style={{...btn,background:`linear-gradient(135deg,${topic.color},${topic.color}bb)`,padding:'13px 24px'}}>➡️ Nächste Aufgabe</button>
              <button onClick={onBack} style={{...btn,background:'rgba(255,255,255,0.06)',color:'#475569'}}>📚 Thema wechseln</button>
            </div>
            {count===queue.length && (
              <p style={{color:'#f59e0b',marginTop:14,fontSize:13}}>🏆 Alle {queue.length} Aufgaben dieses Levels geschafft! Starte nochmal von vorne.</p>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState('welcome');
  const [name,setName]=useState('');
  const [topic,setTopic]=useState(null);
  const [level,setLevel]=useState(null);
  const [stats,setStats]=useState({total:0,correct:0,byTopic:{bruch:0,prozent:0,geo:0,schluss:0,gleich:0}});

  function handleReport(){
    const t=new Date().toLocaleDateString('de-DE');
    const txt=`📊 Lernfortschritt – ${name}\nDatum: ${t}\n${'─'.repeat(30)}\nAufgaben: ${stats.total} | Richtig: ${stats.correct} | Quote: ${stats.total>0?Math.round(stats.correct/stats.total*100):0}%\n\nNach Thema:\n${TOPICS.map(t=>`• ${t.label}: ${stats.byTopic[t.id]||0} Aufgaben`).join('\n')}`;
    navigator.clipboard.writeText(txt).then(()=>alert('✅ Kopiert!')).catch(()=>alert(txt));
  }

  return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      {screen!=='welcome'&&(
        <div style={{borderBottom:'1px solid rgba(255,255,255,0.05)',padding:'10px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#0f172a',zIndex:10}}>
          <span style={{fontWeight:700,color:'#fff',fontSize:14}}>📐 Mathe Lern-App</span>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <span style={{color:'#334155',fontSize:12}}>👤 {name}</span>
            {stats.total>0&&<button onClick={handleReport} style={{background:'rgba(255,255,255,0.04)',border:'none',borderRadius:20,padding:'5px 12px',color:'#475569',fontSize:11,fontWeight:600}}>📋 Bericht</button>}
          </div>
        </div>
      )}
      {screen==='welcome'  && <WelcomeScreen onStart={n=>{setName(n);setScreen('topics');}}/>}
      {screen==='topics'   && <TopicScreen name={name} onSelect={t=>{setTopic(t);setScreen('level');}} stats={stats} onReport={handleReport}/>}
      {screen==='level'    && <LevelScreen topic={topic} onSelect={l=>{setLevel(l);setScreen('exercise');}} onBack={()=>setScreen('topics')}/>}
      {screen==='exercise' && <ExerciseScreen topic={topic} level={level} onBack={()=>setScreen('topics')}
        onUpdateStats={(tid,ok)=>setStats(s=>({total:s.total+1,correct:s.correct+(ok?1:0),byTopic:{...s.byTopic,[tid]:(s.byTopic[tid]||0)+1}}))}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
