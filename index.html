<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathe Übungen 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --ink: #1A1714;
    --muted: #7A7570;
    --rule: #E2DDD8;
    --easy-bg: #EDF7EE;
    --easy-accent: #2D7D32;
    --easy-light: #C8E6C9;
    --mid-bg: #FFF8E6;
    --mid-accent: #E65100;
    --mid-light: #FFE0B2;
    --hard-bg: #FFF0F0;
    --hard-accent: #C62828;
    --hard-light: #FFCDD2;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: #fff;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    letter-spacing: 0.01em;
  }
  .header-title span { color: #F0C040; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 0.82rem;
    color: #aaa;
  }
  .progress-bar-outer {
    width: 160px;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #F0C040, #FFD700);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  #progress-label { font-family: 'DM Mono', monospace; color: #F0C040; }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 70px);
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--rule);
    padding: 28px 0;
    position: sticky;
    top: 70px;
    height: calc(100vh - 70px);
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 24px 12px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 24px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.18s;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .nav-item:hover { background: var(--bg); color: var(--ink); }
  .nav-item.active {
    border-left-color: var(--ink);
    background: var(--bg);
    color: var(--ink);
    font-weight: 600;
  }
  .nav-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .nav-done { margin-left: auto; color: #2D7D32; font-size: 0.75rem; font-family: 'DM Mono', monospace; }

  /* ── MAIN CONTENT ── */
  main {
    padding: 40px 48px;
    max-width: 860px;
  }

  .topic-header {
    margin-bottom: 36px;
    animation: fadeUp 0.4s ease;
  }
  .topic-eyebrow {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .topic-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .topic-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    border: 1px solid;
  }

  /* ── DIFFICULTY SECTIONS ── */
  .level-block {
    margin-bottom: 32px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: fadeUp 0.4s ease both;
  }
  .level-block:nth-child(2) { animation-delay: 0.08s; }
  .level-block:nth-child(3) { animation-delay: 0.16s; }

  .level-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px;
    cursor: pointer;
    user-select: none;
  }
  .level-header-left { display: flex; align-items: center; gap: 12px; }
  .level-stars { font-size: 1rem; }
  .level-name { font-weight: 600; font-size: 1rem; }
  .level-count { font-size: 0.78rem; color: rgba(0,0,0,0.45); }
  .level-chevron {
    font-size: 0.85rem;
    transition: transform 0.25s;
    color: rgba(0,0,0,0.35);
  }
  .level-block.collapsed .level-chevron { transform: rotate(-90deg); }

  .level-easy .level-header { background: var(--easy-bg); }
  .level-mid .level-header { background: var(--mid-bg); }
  .level-hard .level-header { background: var(--hard-bg); }
  .level-easy .level-name { color: var(--easy-accent); }
  .level-mid .level-name { color: var(--mid-accent); }
  .level-hard .level-name { color: var(--hard-accent); }

  .level-body {
    background: var(--surface);
    border-top: 1px solid var(--rule);
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .level-block.collapsed .level-body { max-height: 0 !important; border-top: none; }

  /* ── EXERCISE CARDS ── */
  .exercise {
    padding: 20px 22px;
    border-bottom: 1px solid var(--rule);
    transition: background 0.15s;
  }
  .exercise:last-child { border-bottom: none; }
  .exercise-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .ex-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .level-easy .ex-num { background: var(--easy-light); color: var(--easy-accent); }
  .level-mid .ex-num { background: var(--mid-light); color: var(--mid-accent); }
  .level-hard .ex-num { background: var(--hard-light); color: var(--hard-accent); }

  .ex-question {
    font-size: 0.95rem;
    line-height: 1.6;
    flex: 1;
  }
  .ex-formula {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 8px 14px;
    margin: 10px 0 0 42px;
    letter-spacing: 0.02em;
  }

  /* ── ANSWER AREA ── */
  .answer-area {
    margin-top: 14px;
    margin-left: 42px;
  }
  .answer-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  textarea {
    width: 100%;
    min-height: 80px;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(26,23,20,0.07); }

  .ex-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1.5px solid var(--rule);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .btn:hover { background: var(--bg); border-color: #bbb; }
  .btn-check {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .btn-check:hover { background: #333; }
  .btn-clear { color: var(--muted); }

  .feedback {
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.82rem;
    display: none;
    line-height: 1.5;
  }
  .feedback.show { display: block; animation: fadeUp 0.2s ease; }
  .feedback.correct { background: #E8F5E9; color: #1B5E20; border: 1px solid #A5D6A7; }
  .feedback.hint { background: #FFF8E6; color: #5D4037; border: 1px solid #FFE0B2; }

  /* ── ANSWER KEY TOGGLE ── */
  .solution-tag {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 8px;
    background: var(--rule);
    color: var(--muted);
    user-select: none;
    transition: all 0.15s;
  }
  .solution-tag:hover { background: #ddd; color: var(--ink); }
  .solution-reveal {
    display: none;
    margin-top: 8px;
    margin-left: 42px;
    padding: 10px 14px;
    background: #f0f8ff;
    border: 1px solid #b3d4f5;
    border-radius: 8px;
    font-size: 0.85rem;
    color: #0d4880;
    font-family: 'DM Mono', monospace;
  }
  .solution-reveal.show { display: block; animation: fadeUp 0.2s ease; }

  /* ── SUMMARY PANEL ── */
  .summary-bar {
    position: fixed;
    bottom: 0;
    left: 260px;
    right: 0;
    background: var(--ink);
    color: #fff;
    padding: 12px 48px;
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 0.84rem;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 50;
  }
  .summary-bar.visible { transform: translateY(0); }
  .sum-item { display: flex; align-items: center; gap: 6px; }
  .sum-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── HOME / OVERVIEW ── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px;
    animation: fadeUp 0.4s ease;
  }
  .overview-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 24px 22px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .overview-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .overview-card:nth-child(1)::before { background: linear-gradient(90deg, #4CAF50, #81C784); }
  .overview-card:nth-child(2)::before { background: linear-gradient(90deg, #2196F3, #64B5F6); }
  .overview-card:nth-child(3)::before { background: linear-gradient(90deg, #FF9800, #FFB74D); }
  .overview-card:nth-child(4)::before { background: linear-gradient(90deg, #9C27B0, #CE93D8); }
  .overview-card:nth-child(5)::before { background: linear-gradient(90deg, #F44336, #EF9A9A); }

  .overview-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--rule); }
  .ov-icon { font-size: 2rem; margin-bottom: 12px; }
  .ov-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 6px; }
  .ov-sub { font-size: 0.78rem; color: var(--muted); }
  .ov-pills { display: flex; gap: 5px; margin-top: 14px; }
  .ov-pill {
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }
  .pill-e { background: var(--easy-light); color: var(--easy-accent); }
  .pill-m { background: var(--mid-light); color: var(--mid-accent); }
  .pill-h { background: var(--hard-light); color: var(--hard-accent); }

  .home-hero {
    margin-bottom: 36px;
    animation: fadeUp 0.35s ease;
  }
  .home-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .home-hero h1 em { font-style: italic; color: #8B7355; }
  .home-hero p { font-size: 1rem; color: var(--muted); max-width: 480px; line-height: 1.65; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Print ── */
  @media print {
    aside, header, .ex-actions, .summary-bar, .btn { display: none !important; }
    main { padding: 0; }
    .app { grid-template-columns: 1fr; }
    .level-block.collapsed .level-body { max-height: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">Mathe <span>Übungen</span> 2026</div>
  <div class="progress-wrap">
    <span>Fortschritt</span>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="prog-bar" style="width:0%"></div>
    </div>
    <span id="progress-label">0 / 0</span>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sidebar-label">Themen</div>
    <div class="nav-item active" data-page="home" onclick="navigate('home')">
      <div class="nav-icon" style="background:#F7F4EF">🏠</div>
      Übersicht
    </div>
    <div style="height:8px"></div>
    <div class="sidebar-label">Aufgaben</div>
    <div class="nav-item" data-page="bruch" onclick="navigate('bruch')">

      Bruchrechnung
      <span class="nav-done" id="done-bruch"></span>
    </div>
    <div class="nav-item" data-page="prozent" onclick="navigate('prozent')">
      <div class="nav-icon" style="background:#E3F2FD">%</div>
      Prozentrechnung
      <span class="nav-done" id="done-prozent"></span>
    </div>
    <div class="nav-item" data-page="geo" onclick="navigate('geo')">
      <div class="nav-icon" style="background:#FFF3E0">📐</div>
      Geometrie
      <span class="nav-done" id="done-geo"></span>
    </div>
    <div class="nav-item" data-page="schluss" onclick="navigate('schluss')">
      <div class="nav-icon" style="background:#F3E5F5">🔢</div>
      Schlussrechnung
      <span class="nav-done" id="done-schluss"></span>
    </div>
    <div class="nav-item" data-page="gleich" onclick="navigate('gleich')">
      <div class="nav-icon" style="background:#FFEBEE">⚖️</div>
      Gleichungslehre
      <span class="nav-done" id="done-gleich"></span>
    </div>
  </aside>

  <main id="main-content"></main>
</div>

<div class="summary-bar" id="summary-bar">
  <div class="sum-item"><div class="sum-dot" style="background:#81C784"></div> <span id="s-done">0 erledigt</span></div>
  <div class="sum-item"><div class="sum-dot" style="background:#F0C040"></div> <span id="s-total">0 gesamt</span></div>
  <div style="margin-left:auto; font-size:0.75rem; color:#aaa;">Weiter so! 💪</div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const topics = {
  bruch: {
    icon: '➗',
    title: 'Bruchrechnung',
    levels: [
      {
        id: 'easy', label: 'Einfach', stars: '⭐',
        exercises: [
          { q: 'Berechne: 1/2 + 1/4', formula: '1/2 + 1/4 = ?', sol: '3/4' },
          { q: 'Berechne: 3/4 − 1/2', formula: '3/4 − 1/2 = ?', sol: '1/4' },

      },
      {

      {

  prozent: {

          { q: 'Wie viel sind 10% von 85 kg?', sol: '8,5 kg' },

      },
      {

        ]
      },
      {

        exercises: [
          { q: '8 Maschinen produzieren in 6 Stunden 1.440 Teile. Wie viele produzieren 5 Maschinen in 9 Stunden?', sol: '1.350 Teile' },
          { q: '6 Handwerker erledigen eine Arbeit in 10 Tagen. Wie lange brauchen 4 Handwerker?', sol: '15 Tage' },
          { q: 'Rezept für 4 Personen: 320 g Mehl, 250 ml Milch, 3 Eier. Wie viel für 7 Personen?', sol: '560 g Mehl, 437,5 ml Milch, 5,25 Eier' },
          { q: '12 Arbeiter beenden ein Projekt in 45 Tagen. Es soll in 30 Tagen fertig sein. Wie viele zusätzliche Arbeiter braucht man?', sol: '6 zusätzliche Arbeiter (= 18 gesamt)' },

          { q: 'Drei Rohre füllen einen Tank in 4 Stunden. Rohr A allein: 12 h, Rohr B allein: 18 h. Wie lange braucht Rohr C allein?', sol: '9 Stunden' },

          { q: 'Löse nach x auf: 6 + 9x − 3 = 12x − 15 + 2x', formula: '6 + 9x − 3 = 12x − 15 + 2x', sol: 'x = 18/5 = 3,6' },

          { q: 'Mias Alter ist 3 Jahre weniger als das doppelte Alter von Tim. In 5 Jahren ist die Summe beider Alter 50. Wie alt sind Mia und Tim heute?', sol: 'Tim = 14, Mia = 25' },

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const state = { answers: {}, shown: {} };
let currentPage = 'home';
let totalEx = 0, doneEx = 0;

function totalExercises() {
  let t = 0;
  Object.values(topics).forEach(tp => tp.levels.forEach(l => t += l.exercises.length));
  return t;
}

function countDone() {
  return Object.keys(state.answers).filter(k => state.answers[k] && state.answers[k].trim().length > 0).length;
}

function topicDone(tid) {
  const tp = topics[tid];
  let done = 0, tot = 0;
  tp.levels.forEach(l => {
    l.exercises.forEach((e, i) => {
      tot++;
      const key = `${tid}-${l.id}-${i}`;
      if (state.answers[key] && state.answers[key].trim()) done++;
    });
  });
  return { done, tot };
}

function updateProgress() {
  totalEx = totalExercises();
  doneEx = countDone();
  const pct = totalEx ? Math.round((doneEx / totalEx) * 100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${doneEx} / ${totalEx}`;
  document.getElementById('s-done').textContent = `${doneEx} erledigt`;
  document.getElementById('s-total').textContent = `${totalEx} gesamt`;

  // nav done labels
  Object.keys(topics).forEach(tid => {
    const { done, tot } = topicDone(tid);
    const el = document.getElementById('done-' + tid);
    if (el) el.textContent = done > 0 ? `${done}/${tot}` : '';
  });

  // summary bar
  const bar = document.getElementById('summary-bar');
  if (doneEx > 0) bar.classList.add('visible'); else bar.classList.remove('visible');
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const el = document.getElementById('main-content');
  if (currentPage === 'home') {
    el.innerHTML = renderHome();
  } else {
    el.innerHTML = renderTopic(currentPage);
    attachHandlers(currentPage);
    // Restore saved answers
    const tp = topics[currentPage];
    tp.levels.forEach(l => {
      l.exercises.forEach((e, i) => {
        const key = `${currentPage}-${l.id}-${i}`;
        const ta = document.getElementById('ta-' + key);
        if (ta && state.answers[key]) ta.value = state.answers[key];
      });
    });
  }
  updateProgress();
}

function renderHome() {
  const cards = Object.entries(topics).map(([id, tp]) => {
    const { done, tot } = topicDone(id);
    return `
    <div class="overview-card" onclick="navigate('${id}')">
      <div class="ov-icon">${tp.icon}</div>
      <div class="ov-title">${tp.title}</div>
      <div class="ov-sub">${tot} Aufgaben · ${done > 0 ? done + ' erledigt' : '3 Schwierigkeitsstufen'}</div>
      <div class="ov-pills">
        <span class="ov-pill pill-e">⭐ Einfach</span>
        <span class="ov-pill pill-m">⭐⭐ Mittel</span>
        <span class="ov-pill pill-h">⭐⭐⭐ Schwer</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="home-hero">
    <h1>Mathe<br><em>Übungen</em> 2026</h1>
    <p>Wähle ein Thema und übe auf deinem Niveau – von einfachen Grundlagen bis zu anspruchsvollen Aufgaben.</p>
  </div>
  <div class="overview-grid">${cards}</div>`;
}

function renderTopic(tid) {
  const tp = topics[tid];
  const levelColors = { easy: 'easy', mid: 'mid', hard: 'hard' };

  const levelBlocks = tp.levels.map(l => {
    const cls = 'level-' + levelColors[l.id];
    const exHTML = l.exercises.map((e, i) => {
      const key = `${tid}-${l.id}-${i}`;
      return `
      <div class="exercise">
        <div class="exercise-top">
          <div class="ex-num">${i + 1}</div>
          <div class="ex-question">
            ${e.q}
            <span class="solution-tag" onclick="toggleSol('${key}')">Lösung</span>
          </div>
        </div>
        ${e.formula ? `<div class="ex-formula">${e.formula}</div>` : ''}
        <div class="solution-reveal" id="sol-${key}">${e.sol}</div>
        <div class="answer-area">
          <div class="answer-label">Rechenweg & Antwort</div>
          <textarea id="ta-${key}" placeholder="Hier deine Lösung aufschreiben …" rows="3"
            onchange="saveAnswer('${key}', this.value)"></textarea>
          <div class="ex-actions">
            <button class="btn btn-check" onclick="checkAnswer('${key}', '${esc(e.sol)}')">Antwort prüfen</button>
            <button class="btn btn-clear" onclick="clearAnswer('${key}')">Löschen</button>
          </div>
          <div class="feedback" id="fb-${key}"></div>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="level-block ${cls}" id="block-${tid}-${l.id}">
      <div class="level-header" onclick="toggleBlock('${tid}-${l.id}')">
        <div class="level-header-left">
          <span class="level-stars">${l.stars}</span>
          <span class="level-name">${l.label}</span>
          <span class="level-count">${l.exercises.length} Aufgaben</span>
        </div>
        <span class="level-chevron">▼</span>
      </div>
      <div class="level-body" id="body-${tid}-${l.id}" style="max-height: 9999px">
        ${exHTML}
      </div>
    </div>`;
  }).join('');

  return `
  <div class="topic-header">
    <div class="topic-eyebrow">Thema</div>
    <div class="topic-title">${tp.icon} ${tp.title}</div>
    <div class="topic-meta">
      <span class="badge" style="background:var(--easy-bg);color:var(--easy-accent);border-color:var(--easy-light)">⭐ Einfach</span>
      <span class="badge" style="background:var(--mid-bg);color:var(--mid-accent);border-color:var(--mid-light)">⭐⭐ Mittel</span>
      <span class="badge" style="background:var(--hard-bg);color:var(--hard-accent);border-color:var(--hard-light)">⭐⭐⭐ Anspruchsvoll</span>
    </div>
  </div>
  ${levelBlocks}`;
}

function esc(s) {
  return (s || '').replace(/'/g, "\\'");
}

function attachHandlers(tid) {
  // textarea auto-save
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function saveAnswer(key, val) {
  state.answers[key] = val;
  updateProgress();
}

function checkAnswer(key, sol) {
  const ta = document.getElementById('ta-' + key);
  const fb = document.getElementById('fb-' + key);
  const val = ta ? ta.value.trim() : '';
  state.answers[key] = val;

  if (!val) {
    fb.className = 'feedback hint show';
    fb.textContent = '✏️ Bitte erst eine Antwort eingeben!';
  } else {
    fb.className = 'feedback correct show';
    fb.innerHTML = `✅ Antwort gespeichert! Musterlösung: <strong>${sol}</strong>`;
  }
  updateProgress();
}

function clearAnswer(key) {
  const ta = document.getElementById('ta-' + key);
  const fb = document.getElementById('fb-' + key);
  if (ta) ta.value = '';
  if (fb) { fb.className = 'feedback'; fb.textContent = ''; }
  state.answers[key] = '';
  updateProgress();
}

function toggleSol(key) {
  const el = document.getElementById('sol-' + key);
  if (el) el.classList.toggle('show');
}

function toggleBlock(id) {
  const block = document.getElementById('block-' + id);
  const body = document.getElementById('body-' + id);
  if (!block || !body) return;
  const collapsed = block.classList.toggle('collapsed');
  if (!collapsed) body.style.maxHeight = '9999px';
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
render();
</script>
