<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatheMeister – Lernapp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #242236;
    --border: #2e2b45;
    --text: #fffffe;
    --muted: #a7a9be;
    --bruch: #ff6b6b;
    --prozent: #ffa94d;
    --geo: #51cf66;
    --schluss: #339af0;
    --gleich: #cc5de8;
    --easy: #51cf66;
    --mid: #ffa94d;
    --hard: #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ── Header ── */
  header { text-align: center; padding: 40px 0 32px; }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    letter-spacing: 2px;
    background: linear-gradient(135deg, #ff6b6b, #cc5de8, #339af0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 1rem; font-weight: 600; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 32px;
  }
  .stat-pill {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 99px; padding: 8px 20px; font-size: .85rem; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-pill span { font-size: 1.1rem; }

  /* ── Topic grid ── */
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 14px; padding-left: 4px;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 32px;
  }

  .topic-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 20px; padding: 22px 16px; text-align: center;
    cursor: pointer; transition: all .2s ease;
    position: relative; overflow: hidden;
  }
  .topic-card::before {
    content: ''; position: absolute; inset: 0;
    background: var(--tc); opacity: 0; transition: opacity .2s;
  }
  .topic-card:hover { transform: translateY(-4px); border-color: var(--tc); }
  .topic-card:hover::before { opacity: .08; }
  .topic-card.active { border-color: var(--tc); background: var(--surface2); }
  .topic-card.active::before { opacity: .12; }

  .topic-icon {
    font-size: 2.2rem; display: block; margin-bottom: 10px;
    filter: drop-shadow(0 0 10px var(--tc));
  }
  .topic-name { font-weight: 800; font-size: .95rem; }
  .topic-progress {
    margin-top: 8px; font-size: .75rem; color: var(--muted); font-weight: 600;
  }
  .topic-bar {
    margin-top: 6px; height: 4px; background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .topic-bar-fill { height: 100%; background: var(--tc); border-radius: 99px; transition: width .4s ease; }

  /* ── Level selector ── */
  .level-row {
    display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .level-btn {
    flex: 1; min-width: 90px; background: var(--surface);
    border: 2px solid var(--border); border-radius: 14px;
    padding: 14px 10px; text-align: center; cursor: pointer;
    transition: all .2s ease; font-family: inherit;
  }
  .level-btn .lv-emoji { font-size: 1.6rem; display: block; margin-bottom: 4px; }
  .level-btn .lv-name { font-weight: 800; font-size: .9rem; display: block; }
  .level-btn .lv-desc { font-size: .75rem; color: var(--muted); display: block; }
  .level-btn:hover { transform: translateY(-3px); }
  .level-btn.active-easy { border-color: var(--easy); background: rgba(81,207,102,.1); }
  .level-btn.active-mid  { border-color: var(--mid);  background: rgba(255,169,77,.1); }
  .level-btn.active-hard { border-color: var(--hard); background: rgba(255,107,107,.1); }

  /* ── Question card ── */
  .question-area { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  .q-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
  }
  .q-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .badge {
    padding: 4px 14px; border-radius: 99px; font-size: .78rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-topic { background: rgba(255,255,255,.08); color: var(--text); }
  .badge-level { }
  .badge-easy { background: rgba(81,207,102,.2); color: var(--easy); }
  .badge-mid  { background: rgba(255,169,77,.2);  color: var(--mid); }
  .badge-hard { background: rgba(255,107,107,.2); color: var(--hard); }

  .q-counter { font-size: .85rem; font-weight: 700; color: var(--muted); }

  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 30px; margin-bottom: 20px;
  }
  .q-text {
    font-size: clamp(1rem, 3vw, 1.2rem); font-weight: 700; line-height: 1.6;
    margin-bottom: 24px; color: var(--text);
  }
  .q-svg {
    margin-bottom: 20px;
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    display: flex;
    justify-content: center;
  }
  .q-svg svg {
    max-width: 240px;
    width: 100%;
    height: auto;
  }

  .q-hint {
    font-size: .85rem; color: var(--muted); font-weight: 600;
    background: rgba(255,255,255,.04); border-radius: 10px; padding: 10px 14px;
    margin-bottom: 20px; border-left: 3px solid var(--border);
  }

  /* Options / input */
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .option-btn {
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: 14px; padding: 14px 16px; text-align: left;
    cursor: pointer; font-family: inherit; font-size: .95rem;
    font-weight: 700; color: var(--text); transition: all .15s ease;
    display: flex; align-items: center; gap: 10px;
  }
  .option-letter {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(255,255,255,.08); display: flex;
    align-items: center; justify-content: center;
    font-size: .8rem; flex-shrink: 0;
  }
  .option-btn:hover:not(:disabled) { border-color: #555; transform: translateX(4px); }
  .option-btn.correct { border-color: var(--easy); background: rgba(81,207,102,.15); }
  .option-btn.wrong   { border-color: var(--hard); background: rgba(255,107,107,.15); }
  .option-btn:disabled { cursor: default; }

  /* Input style */
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .answer-input {
    flex: 1; min-width: 180px; background: var(--surface2);
    border: 2px solid var(--border); border-radius: 14px;
    padding: 14px 18px; font-family: inherit; font-size: 1.1rem;
    font-weight: 700; color: var(--text); outline: none;
    transition: border-color .2s;
  }
  .answer-input:focus { border-color: #555; }
  .answer-input.correct { border-color: var(--easy); }
  .answer-input.wrong   { border-color: var(--hard); }
  .submit-btn {
    background: linear-gradient(135deg, #cc5de8, #339af0);
    border: none; border-radius: 14px; padding: 14px 28px;
    color: #fff; font-family: inherit; font-size: 1rem; font-weight: 800;
    cursor: pointer; transition: all .2s ease; white-space: nowrap;
  }
  .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .submit-btn:disabled { opacity: .5; cursor: default; transform: none; }

  /* Feedback */
  .feedback {
    border-radius: 14px; padding: 16px 20px; font-weight: 700;
    display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap;
    margin-top: 16px; animation: fadeIn .2s ease;
  }
  .feedback.correct-fb { background: rgba(81,207,102,.15); border: 1px solid rgba(81,207,102,.3); color: var(--easy); }
  .feedback.wrong-fb   { background: rgba(255,107,107,.15); border: 1px solid rgba(255,107,107,.3); color: var(--hard); }
  .feedback-icon { font-size: 1.4rem; }
  .feedback-text { flex: 1; line-height: 1.5; }
  .solution-steps {
    font-size: .9rem; margin-top: 8px; color: var(--text);
    opacity: .9; font-weight: 600;
  }

  /* Nav buttons */
  .nav-row {
    display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap;
    margin-top: 20px;
  }
  .nav-btn {
    flex: 1; min-width: 120px; padding: 14px 20px; border-radius: 14px;
    border: 2px solid var(--border); background: var(--surface);
    color: var(--text); font-family: inherit; font-size: .95rem;
    font-weight: 800; cursor: pointer; transition: all .2s ease;
  }
  .nav-btn:hover { border-color: #666; transform: translateY(-2px); }
  .nav-btn.primary {
    background: linear-gradient(135deg, #cc5de8, #339af0);
    border-color: transparent; color: #fff;
  }

  /* Progress dots */
  .progress-dots {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent; transition: all .2s;
  }
  .dot.done-correct { background: var(--easy); border-color: var(--easy); }
  .dot.done-wrong   { background: var(--hard); border-color: var(--hard); }
  .dot.current      { border-color: #aaa; background: rgba(255,255,255,.2); }

  /* Results */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 36px; text-align: center;
    animation: fadeIn .4s ease;
  }
  .result-big { font-size: 5rem; margin-bottom: 16px; }
  .result-title {
    font-family: 'Fredoka One', cursive; font-size: 2rem; margin-bottom: 8px;
    background: linear-gradient(135deg, #ff6b6b, #cc5de8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .result-score {
    font-size: 3rem; font-weight: 800; margin: 20px 0;
    color: var(--text);
  }
  .result-sub { color: var(--muted); font-weight: 600; margin-bottom: 28px; }
  .result-breakdown {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px;
  }
  .rb-item {
    background: var(--surface2); border-radius: 14px; padding: 14px 20px;
    text-align: center;
  }
  .rb-num { font-size: 1.8rem; font-weight: 800; }
  .rb-label { font-size: .8rem; color: var(--muted); font-weight: 600; margin-top: 2px; }

  /* home button */
  .home-btn {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 99px; padding: 8px 16px; cursor: pointer;
    font-family: inherit; font-size: .85rem; font-weight: 800;
    color: var(--text); transition: all .2s; display: none;
  }
  .home-btn.visible { display: flex; align-items: center; gap: 6px; }
  .home-btn:hover { border-color: #666; transform: translateX(-2px); }

  /* Responsive */
  @media (max-width: 500px) {
    .q-card { padding: 20px 16px; }
    .options-grid { grid-template-columns: 1fr; }
    .nav-btn { font-size: .85rem; padding: 12px 14px; }
  }
</style>
</head>
<body>
<button class="home-btn" id="homeBtn" onclick="goHome()">← Menü</button>

<div class="app">
  <div id="screen-home">
    <header>
      <h1>MatheMeister</h1>
      <p>Lernapp · Mathe 2026 · Klasse 8</p>
    </header>

    <div class="stats-bar">
      <div class="stat-pill"><span>🏆</span> Gesamt: <strong id="statTotal">0</strong> richtig</div>
      <div class="stat-pill"><span>🎯</span> Genauigkeit: <strong id="statAcc">–</strong></div>
      <div class="stat-pill"><span>🔥</span> Streak: <strong id="statStreak">0</strong></div>
    </div>

    <p class="section-title">Thema wählen</p>
    <div class="topic-grid" id="topicGrid"></div>

    <p class="section-title">Schwierigkeitsgrad</p>
    <div class="level-row" id="levelRow"></div>

    <div style="text-align:center;margin-top:10px;">
      <button class="submit-btn" style="font-size:1.1rem;padding:18px 48px;" onclick="startQuiz()">
        🚀 Los geht's!
      </button>
    </div>
  </div>

  <div id="screen-quiz" style="display:none;"></div>
  <div id="screen-result" style="display:none;"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
//  QUESTION BANK  –  5 Themen × 3 Level × 15 Fragen = 225 Aufgaben
// ══════════════════════════════════════════════════════════════════════════════
const QDB = {

// ─── BRUCHRECHNUNG ─────────────────────────────────────────────────────────
bruch: {
  1: [
    { q:"Berechne: 1/2 + 1/4", opts:["3/4","2/6","1/2","5/8"], ans:0, hint:"Bringe auf einen gemeinsamen Nenner (4).", sol:"1/2 = 2/4 → 2/4 + 1/4 = 3/4" },
    { q:"Berechne: 1/3 + 1/3", opts:["2/3","2/6","1/6","3/6"], ans:0, hint:"Gleiche Nenner? Einfach Zähler addieren.", sol:"1/3 + 1/3 = 2/3" },
    { q:"Berechne: 3/4 − 1/4", opts:["2/4 = 1/2","1/4","3/8","2/8"], ans:0, hint:"Gleicher Nenner – Zähler subtrahieren.", sol:"3/4 − 1/4 = 2/4 = 1/2" },
    { q:"Kürze: 4/8", opts:["1/2","2/4","4/8","1/4"], ans:0, hint:"Teile Zähler und Nenner durch 4.", sol:"4÷4 / 8÷4 = 1/2" },
    { q:"Berechne: 1/2 · 1/2", opts:["1/4","1/2","2/4","1/8"], ans:0, hint:"Zähler · Zähler, Nenner · Nenner.", sol:"1·1 / 2·2 = 1/4" },
    { q:"Kürze: 6/9", opts:["2/3","3/4","1/3","6/9"], ans:0, hint:"GGT von 6 und 9 ist 3.", sol:"6÷3 / 9÷3 = 2/3" },
    { q:"Berechne: 2/5 + 1/5", opts:["3/5","3/10","2/5","1/2"], ans:0, hint:"Gleiche Nenner, Zähler addieren.", sol:"2/5 + 1/5 = 3/5" },
    { q:"Berechne: 3/4 : 3/4", opts:["1","9/16","3/4","4/3"], ans:0, hint:"Dividieren = mal Kehrwert.", sol:"3/4 · 4/3 = 12/12 = 1" },
    { q:"Kürze: 10/15", opts:["2/3","1/2","5/8","3/5"], ans:0, hint:"GGT = 5.", sol:"10÷5 / 15÷5 = 2/3" },
    { q:"Berechne: 1/4 + 3/8", opts:["5/8","4/12","1/2","7/8"], ans:0, hint:"1/4 = 2/8, dann addieren.", sol:"2/8 + 3/8 = 5/8" },
    { q:"Wandle um: 1½ in unechten Bruch", opts:["3/2","2/3","4/3","5/4"], ans:0, hint:"1·2 + 1 = 3, Nenner bleibt 2.", sol:"1·2+1 = 3 → 3/2" },
    { q:"Berechne: 2/3 · 3/4", opts:["1/2","6/12","2/4","3/6"], ans:0, hint:"2·3 / 3·4, dann kürzen.", sol:"6/12 = 1/2" },
    { q:"Kürze: 8/12", opts:["2/3","3/4","4/6","1/2"], ans:0, hint:"GGT(8,12) = 4.", sol:"8÷4 / 12÷4 = 2/3" },
    { q:"Berechne: 5/6 − 1/3", opts:["1/2","4/3","2/6","5/9"], ans:0, hint:"1/3 = 2/6.", sol:"5/6 − 2/6 = 3/6 = 1/2" },
    { q:"Berechne: 1/2 : 1/4", opts:["2","1/8","4","1/2"], ans:0, hint:"1/2 · 4/1 = ?", sol:"1/2 · 4/1 = 4/2 = 2" },
  ],
  2: [
    { q:"Berechne: 3/8 + 5/12", opts:["19/24","8/20","2/3","7/12"], ans:0, hint:"KGV(8,12)=24.", sol:"9/24 + 10/24 = 19/24" },
    { q:"Berechne: 2¾ + 1⅓", opts:["4 1/12","3 7/12","4 1/4","3 13/12"], ans:0, hint:"Ganze getrennt, dann Brüche addieren.", sol:"3 + (9/12+4/12) = 3+13/12 = 4 1/12" },
    { q:"Berechne: 7/9 − 2/3", opts:["1/9","5/6","1/3","5/9"], ans:0, hint:"2/3 = 6/9.", sol:"7/9 − 6/9 = 1/9" },
    { q:"Berechne: 5/6 · 3/10", opts:["1/4","15/60","1/2","1/3"], ans:0, hint:"5·3 / 6·10 = 15/60, kürzen.", sol:"15/60 = 1/4" },
    { q:"Berechne: 4/5 : 2/3", opts:["6/5","8/15","2/5","12/10"], ans:0, hint:"4/5 · 3/2.", sol:"12/10 = 6/5 = 1 1/5" },
    { q:"Eine Pizza wird in 8 Stücke geteilt. Tom isst 3/8, Lisa isst 2/8. Wie viel ist übrig?", opts:["3/8","5/8","1/4","2/8"], ans:0, hint:"1 − 3/8 − 2/8.", sol:"8/8−3/8−2/8 = 3/8" },
    { q:"Berechne: (1/2 + 1/3) · 6", opts:["5","3","4","6"], ans:0, hint:"Erst Klammer: 3/6+2/6=5/6, dann ·6.", sol:"5/6 · 6 = 5" },
    { q:"Kürze vollständig: 36/48", opts:["3/4","9/12","6/8","2/3"], ans:0, hint:"GGT(36,48)=12.", sol:"36÷12 / 48÷12 = 3/4" },
    { q:"Berechne: 3½ · 2/7", opts:["1","7/4","1 1/4","3/7"], ans:0, hint:"3½ = 7/2 → 7/2 · 2/7.", sol:"14/14 = 1" },
    { q:"Berechne: 2/3 + 3/4 − 1/6", opts:["5/4","3/4","1 1/4","7/12"], ans:0, hint:"KGV=12: 8/12+9/12−2/12.", sol:"15/12 = 5/4 = 1 1/4" },
    { q:"Welcher Bruch liegt zwischen 1/3 und 1/2?", opts:["5/12","1/4","2/5","3/8"], ans:0, hint:"Auf Nenner 12: 4/12 und 6/12 – was liegt dazwischen?", sol:"5/12 liegt zwischen 4/12 und 6/12" },
    { q:"Berechne: 5/8 : 1¼", opts:["1/2","5/10","5/8","4/5"], ans:0, hint:"1¼ = 5/4 → 5/8 · 4/5.", sol:"20/40 = 1/2" },
    { q:"Berechne: 1 − 3/7 − 2/7", opts:["2/7","5/7","1/7","3/7"], ans:0, hint:"7/7 − 3/7 − 2/7.", sol:"2/7" },
    { q:"Wie viel ist 3/4 von 80?", opts:["60","40","30","75"], ans:0, hint:"80 · 3/4 = ?", sol:"80·3÷4 = 60" },
    { q:"Berechne: (3/4 − 1/8) : 5/8", opts:["5/4","1","5/8","10/8"], ans:0, hint:"3/4−1/8 = 5/8; dann 5/8 : 5/8.", sol:"5/8 · 8/5 = 1" },
  ],
  3: [
    { q:"Berechne: 3/8 + 5/6 − 7/12", opts:["7/8","5/8","3/4","11/12"], ans:0, hint:"KGV(8,6,12)=24.", sol:"9/24+20/24−14/24=15/24=5/8" },
    { q:"Berechne: 2⅔ · 1⅞", opts:["5","4 11/12","5 1/3","4 3/4"], ans:0, hint:"2⅔=8/3, 1⅞=15/8 → multiplizieren.", sol:"8/3·15/8 = 120/24 = 5" },
    { q:"Berechne: (2/3)² + 1/9", opts:["5/9","7/9","4/9","1/3"], ans:0, hint:"(2/3)² = 4/9.", sol:"4/9+1/9=5/9" },
    { q:"Wandergruppe: ³⁄₇ + ²⁄₅ der Strecke zurückgelegt. Welchen Anteil noch übrig?", opts:["16/35","15/35","19/35","1/5"], ans:0, hint:"1 − 3/7 − 2/5. KGV=35.", sol:"35/35−15/35−14/35=6/35 – Aufgabe: zurückgelegt=29/35, übrig=6/35" },
    { q:"Berechne: 4/9 : (2/3 · 3/8)", opts:["8/9","2","16/9","4/3"], ans:0, hint:"Erst Klammer: 6/24=1/4, dann 4/9 : 1/4.", sol:"4/9·4/1=16/9" },
    { q:"Vereinfache: (5/6 − 1/4) · 12/7", opts:["10/7","5/7","8/7","7/6"], ans:0, hint:"5/6−1/4: KGV=12 → 10/12−3/12=7/12.", sol:"7/12·12/7=1 – warte: 7/12·12/7=1 ✓" },

    { q:"Löse: x/3 − x/6 = 2", opts:["x = 12","x = 6","x = 4","x = 3"], ans:0, hint:"KGV=6: 2x/6−x/6=x/6=2.", sol:"x = 12" },
    { q:"Löse: 4(x − 2) − 3(x + 1) = 5", opts:["x = 16","x = 6","x = −16","x = 2"], ans:0, hint:"4x−8−3x−3=5; x−11=5.", sol:"x = 16" },
    { q:"Löse: (2x+1)/3 = (x−1)/2 + 1", opts:["x = 5","x = −5","x = 7","x = 1"], ans:0, hint:"Multipliziere mit KGV=6.", sol:"2(2x+1)=3(x−1)+6; 4x+2=3x+3; x=5" },
    { q:"Löse: 5x − 3(x − 4) = 2(x + 6)", opts:["x = 0","Keine Lösung","∞ viele","x = 1"], ans:2, hint:"5x−3x+12=2x+12; 2x+12=2x+12 → wahr für alle x.", sol:"0=0 → unendlich viele Lösungen" },
    { q:"Löse: 2(x − 3) + 4 = 2x", opts:["Keine Lösung","x = 0","x = 3","∞ viele"], ans:0, hint:"2x−6+4=2x; −2=0 → Widerspruch.", sol:"Keine Lösung" },
    { q:"Löse nach x: ax + b = c (a≠0)", opts:["x = (c−b)/a","x = (c+b)/a","x = c/(a+b)","x = a/(c−b)"], ans:0, hint:"ax=c−b.", sol:"x = (c−b)/a" },
    { q:"Löse: 3(2x + 1) − 2(3x − 2) = 11", opts:["Keine Lösung","x=1","∞ viele","x=0"], ans:0, hint:"6x+3−6x+4=11; 7=11 → Widerspruch.", sol:"7≠11 → Keine Lösung" },
    { q:"Löse das System: x+y=10, x−y=4 (nach x)", opts:["x = 7","x = 3","x = 5","x = 6"], ans:0, hint:"Addiere beide Gleichungen.", sol:"2x=14; x=7" },
    { q:"Löse: 0,5x + 1,5 = 3x − 3", opts:["x = 3","x = 1,8","x = 4","x = 2"], ans:0, hint:"Multipliziere mit 2: x+3=6x−6; 9=5x.", sol:"x = 9/5 = 1,8" },
    { q:"Löse: |x − 3| = 5 (beide Lösungen)", opts:["x=8 und x=−2","x=8","x=2 und x=8","x=−2"], ans:0, hint:"x−3=5 oder x−3=−5.", sol:"x=8 oder x=−2" },
    { q:"Löse: 14 + 2x = −22 − 7x", opts:["x = −4","x = 4","x = −36/9","x = 36/9"], ans:0, hint:"9x = −36.", sol:"x = −4" },
    { q:"Löse: (x+2)² = (x−1)² + 15", opts:["x = 2","x = −2","x = 4","x = 1"], ans:0, hint:"Expand: x²+4x+4=x²−2x+1+15; 6x=12.", sol:"x = 2" },
  ],
},
};

// ══════════════════════════════════════════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════════════════════════════════════════
const TOPICS = [
  { id:"bruch",   label:"Bruchrechnung",   icon:"½", color:"#ff6b6b" },
  { id:"prozent", label:"Prozentrechnung", icon:"%", color:"#ffa94d" },
  { id:"geo",     label:"Geometrie",       icon:"△", color:"#51cf66" },
  { id:"schluss", label:"Schlussrechnung", icon:"⇄", color:"#339af0" },
  { id:"gleich",  label:"Gleichungslehre", icon:"x", color:"#cc5de8" },
];
const LEVELS = [
  { id:1, label:"Leicht", emoji:"🌱", desc:"Grundlagen",  cls:"easy" },
  { id:2, label:"Mittel", emoji:"🔥", desc:"Aufbau",      cls:"mid"  },
  { id:3, label:"Schwer", emoji:"💎", desc:"Profi",       cls:"hard" },
];

let state = {
  topic: "bruch",
  level: 1,
  screen: "home",  // home | quiz | result
  questions: [],
  current: 0,
  answers: [],    // true/false per question
  answered: false,
  selected: null,
  inputVal: "",
  // Global stats (in-memory)
  totalCorrect: 0,
  totalAnswered: 0,
  streak: 0,
  // Per topic-level progress (correct count out of 15)
  progress: {},  // key: topicId+levelId
};

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function $(id){ return document.getElementById(id); }

function topicColor(id){ return TOPICS.find(t=>t.id===id)?.color || "#888"; }

function renderHome(){
  // Stats
  const acc = state.totalAnswered>0 ? Math.round(state.totalCorrect/state.totalAnswered*100)+"%" : "–";
  $("statTotal").textContent = state.totalCorrect;
  $("statAcc").textContent = acc;
  $("statStreak").textContent = state.streak;

  // Topic grid
  const tg = $("topicGrid");
  tg.innerHTML = TOPICS.map(t=>{
    const pct = getTopicProgress(t.id);
    const isActive = state.topic===t.id;
    return `<div class="topic-card ${isActive?'active':''}" style="--tc:${t.color}" onclick="selectTopic('${t.id}')">
      <span class="topic-icon" style="color:${t.color}">${t.icon}</span>
      <div class="topic-name">${t.label}</div>
      <div class="topic-progress">${pct}% geschafft</div>
      <div class="topic-bar"><div class="topic-bar-fill" style="width:${pct}%;background:${t.color}"></div></div>
    </div>`;
  }).join("");

  // Level row
  const lr = $("levelRow");
  lr.innerHTML = LEVELS.map(l=>{
    const isActive = state.level===l.id;
    return `<button class="level-btn ${isActive?'active-'+l.cls:''}" onclick="selectLevel(${l.id})">
      <span class="lv-emoji">${l.emoji}</span>
      <span class="lv-name">${l.label}</span>
      <span class="lv-desc">${l.desc}</span>
    </button>`;
  }).join("");

  $("homeBtn").classList.remove("visible");
}

function getTopicProgress(topicId){
  let total=0, correct=0;
  for(let lv=1;lv<=3;lv++){
    const key=topicId+lv;
    const p=state.progress[key];
    if(p){ correct+=p.correct; total+=15; }
  }
  return total===0?0:Math.round(correct/total*100);
}

function renderQuiz(){
  const q = state.questions[state.current];
  const total = state.questions.length;
  const topicObj = TOPICS.find(t=>t.id===state.topic);
  const levelObj = LEVELS.find(l=>l.id===state.level);
  const color = topicObj.color;

  // Progress dots
  const dots = state.questions.map((_,i)=>{
    let cls="dot";
    if(state.answers[i]===true) cls+=" done-correct";
    else if(state.answers[i]===false) cls+=" done-wrong";
    else if(i===state.current) cls+=" current";
    return `<div class="${cls}" style="${state.answers[i]===undefined&&i===state.current?'border-color:'+color:''}"></div>`;
  }).join("");

  // Options
  const letters=["A","B","C","D"];
  const opts = q.opts.map((o,i)=>{
    let extra="";
    if(state.answered){
      if(i===q.ans) extra=" correct";
      else if(i===state.selected && i!==q.ans) extra=" wrong";
    }
    return `<button class="option-btn${extra}" onclick="selectAnswer(${i})" ${state.answered?"disabled":""}>
      <span class="option-letter" style="${i===q.ans&&state.answered?'background:rgba(81,207,102,.3)':''}">${letters[i]}</span>
      ${o}
    </button>`;
  }).join("");

  // Feedback
  let feedbackHtml="";
  if(state.answered){
    const correct = state.selected===q.ans;
    feedbackHtml=`<div class="feedback ${correct?'correct-fb':'wrong-fb'}">
      <span class="feedback-icon">${correct?'✅':'❌'}</span>
      <div class="feedback-text">
        <strong>${correct?'Richtig! Sehr gut!':'Leider falsch.'}</strong>
        <div class="solution-steps">💡 Lösung: ${q.sol}</div>
      </div>
    </div>`;
  }

  // Nav
  const isLast = state.current===total-1;
  const nextBtn = state.answered
    ? `<button class="nav-btn primary" onclick="${isLast?'showResult()':'nextQuestion()'}">${isLast?'📊 Auswertung':'Nächste →'}</button>`
    : `<button class="nav-btn primary" onclick="nextQuestion()" style="opacity:.3;pointer-events:none">Nächste →</button>`;

  $("screen-quiz").innerHTML=`
    <div class="question-area">
      <div class="q-header">
        <div class="q-meta">
          <span class="badge badge-topic" style="background:${color}22;color:${color}">${topicObj.icon} ${topicObj.label}</span>
          <span class="badge badge-level badge-${levelObj.cls}">${levelObj.emoji} ${levelObj.label}</span>
        </div>
        <span class="q-counter">${state.current+1} / ${total}</span>
      </div>

      <div class="progress-dots">${dots}</div>

      <div class="q-card">
        <div class="q-text">${q.q}</div>
        ${q.svg && state.topic==='geo' ? `<div class="q-svg">${q.svg}</div>` : ''}
        ${q.hint && state.level===1 ?`<div class="q-hint">💡 Tipp: ${q.hint}</div>`:''}
        <div class="options-grid">${opts}</div>
        ${feedbackHtml}
      </div>

      <div class="nav-row">
        <button class="nav-btn" onclick="goHome()">🏠 Abbrechen</button>
        ${nextBtn}
      </div>
    </div>`;
}

function renderResult(){
  const total=state.questions.length;
  const correct=state.answers.filter(a=>a===true).length;
  const pct=Math.round(correct/total*100);
  let grade="", emoji="";
  if(pct>=95){grade="Sehr gut";emoji="🏆";}
  else if(pct>=80){grade="Gut";emoji="⭐";}
  else if(pct>=65){grade="Befriedigend";emoji="👍";}
  else if(pct>=45){grade="Ausreichend";emoji="📚";}
  else if(pct>=23){grade="Mangelhaft";emoji="😅";}
  else{grade="Ungenügend";emoji="😓";}

  const topicObj=TOPICS.find(t=>t.id===state.topic);
  const levelObj=LEVELS.find(l=>l.id===state.level);

  $("screen-result").innerHTML=`
    <div class="result-card">
      <div class="result-big">${emoji}</div>
      <div class="result-title">${grade}!</div>
      <div class="result-score">${correct} / ${total}</div>
      <div class="result-sub">${pct}% korrekt · ${topicObj.label} · ${levelObj.label}</div>
      <div class="result-breakdown">
        <div class="rb-item"><div class="rb-num" style="color:#51cf66">${correct}</div><div class="rb-label">Richtig</div></div>
        <div class="rb-item"><div class="rb-num" style="color:#ff6b6b">${total-correct}</div><div class="rb-label">Falsch</div></div>
        <div class="rb-item"><div class="rb-num" style="color:#ffa94d">${pct}%</div><div class="rb-label">Quote</div></div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <button class="nav-btn primary" onclick="startQuiz()" style="flex:unset;min-width:150px">🔄 Nochmal</button>
        <button class="nav-btn" onclick="goHome()" style="flex:unset;min-width:150px">🏠 Zurück zum Menü</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function selectTopic(id){
  state.topic=id;
  renderHome();
}
function selectLevel(id){
  state.level=id;
  renderHome();
}

function shuffleAnswers(q){
  const indexed = q.opts.map((o,i)=>({o, correct: i===q.ans}));
  for(let i=indexed.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [indexed[i],indexed[j]]=[indexed[j],indexed[i]];
  }
  return {...q, opts: indexed.map(x=>x.o), ans: indexed.findIndex(x=>x.correct)};
}

function startQuiz(){
  const raw=[...QDB[state.topic][state.level]];
  for(let i=raw.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [raw[i],raw[j]]=[raw[j],raw[i]];
  }
  const qs = raw.map(q => shuffleAnswers(q));
  state.questions=qs;
  state.current=0;
  state.answers=new Array(qs.length).fill(undefined);
  state.answered=false;
  state.selected=null;
  state.screen="quiz";
  $("screen-home").style.display="none";
  $("screen-result").style.display="none";
  $("screen-quiz").style.display="";
  $("homeBtn").classList.add("visible");
  renderQuiz();
}

function selectAnswer(idx){
  if(state.answered) return;
  const q=state.questions[state.current];
  state.selected=idx;
  state.answered=true;
  const correct=idx===q.ans;
  state.answers[state.current]=correct;
  // Update global stats
  state.totalAnswered++;
  if(correct){ state.totalCorrect++; state.streak++; }
  else { state.streak=0; }
  renderQuiz();
}

function nextQuestion(){
  if(!state.answered) return;
  state.current++;
  state.answered=false;
  state.selected=null;
  renderQuiz();
}

function showResult(){
  const correct=state.answers.filter(a=>a===true).length;
  const key=state.topic+state.level;
  if(!state.progress[key]||state.progress[key].correct<correct){
    state.progress[key]={correct};
  }
  state.screen="result";
  $("screen-quiz").style.display="none";
  $("screen-result").style.display="";
  renderResult();
}

function goHome(){
  state.screen="home";
  $("screen-quiz").style.display="none";
  $("screen-result").style.display="none";
  $("screen-home").style.display="";
  renderHome();
}

// ── Init ──
renderHome();
</script>
</body>
</html>
